                const host = window.location.host || 'vmsg.itch.io';
                const path = window.location.pathname || '/';
                const mmUrl = 'https://metamask.app.link/dapp/' + host + path;
                const s = document.getElementById('wallet-overlay-status');
                s.innerHTML = '📱 <a href="' + mmUrl + '" target="_blank" style="color:#00dcff">Tap here to open in MetaMask</a><br><small style="opacity:.7">Or install MetaMask on desktop</small>';
                return;
            }
            walletConnectBtn.disabled = true;
            setOverlayStatus('Connecting…');
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                window.walletAddr = accounts[0];
                window.guestName = null; // wallet takes priority
                setOverlayStatus('✓ Connected: ' + accounts[0].slice(0, 6) + '…' + accounts[0].slice(-4), '#39ff8e');
                setTimeout(dismissWalletOverlay, 700);
            } catch {
                walletConnectBtn.disabled = false;
                setOverlayStatus('Cancelled — try again or play as guest', '#ff6b6b');
            }
        });

        // "Play without wallet" — if session code active, ask for guest name first
        walletSkipBtn.addEventListener('click', () => {
            window.walletAddr = null;
            if (window.sessionCode) {
                // Show the guest name input row
                guestNameRow.style.display = 'flex';
                walletSkipBtn.style.display = 'none';
                document.getElementById('guest-name-input').focus();
            } else {
                dismissWalletOverlay();
            }
        });

        document.getElementById('guest-confirm-btn').addEventListener('click', () => {
            const raw = document.getElementById('guest-name-input').value.trim();
            if (raw.length < 1 || raw.length > MAX_NAME_SESSION) {
                sessionStatus.textContent = 'Name must be 1–' + MAX_NAME_SESSION + ' chars';
                sessionStatus.style.color = '#ff2d78';
                return;
            }
            window.guestName = raw;
            dismissWalletOverlay();
        });

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function setStatus(msg, color) {
            const s = document.getElementById('gl-status');
            s.textContent = msg;
            s.style.color = color || 'rgba(180,180,180,0.9)';
        }

        async function loadTopScores() {
            const list = document.getElementById('gl-scores-list');
            const subtitle = document.getElementById('gl-lb-subtitle');
            const code = window.sessionCode;
            list.innerHTML = '<div class="gl-loading">Loading on-chain data…</div>';
            if (subtitle) subtitle.textContent = code ? 'Session: ' + code : 'Global leaderboard';
            try {
                const fetchCount = code ? 50 : 10;
                const allScores = await readClient.readContract({
                    address: CONTRACT,
                    functionName: 'get_top_scores',
                    args: [fetchCount]
                });
                if (!allScores || allScores.length === 0) {
                    list.innerHTML = '<div class="gl-no-scores">No scores yet — be the first!</div>';
                    return;
                }
                let scores = allScores;
                if (code) {
                    const prefix = code + ':';
                    scores = allScores
                        .filter(s => String(s.name).startsWith(prefix))
                        .slice(0, 10)
                        .map(s => ({ ...s, name: String(s.name).slice(prefix.length) }));
                }
                if (scores.length === 0) {
                    list.innerHTML = '<div class="gl-no-scores">No scores for session ' + escapeHtml(code) + ' yet!</div>';
                    return;
                }
                list.innerHTML = scores.map((s, i) =>
                    `<div class="gl-score-row">
                        <span class="gl-rank">#${i + 1}</span>
                        <span class="gl-uname">${escapeHtml(s.name)}</span>
                        <span class="gl-score-val">${Number(s.score).toLocaleString()}</span>
                    </div>`
                ).join('');
            } catch (err) {
                list.innerHTML = `<div class="gl-no-scores">Could not load: ${escapeHtml((err.message || String(err)).substring(0, 80))}</div>`;
            }
        }

        // Called by game when game over
        window.mochiOnGameOver = (scoreVal) => {
            const panel = document.getElementById('gl-panel');
            panel.dataset.score = String(scoreVal);
            const inputRow = document.getElementById('gl-input-row');
            const guestRow = document.getElementById('gl-guest-row');
            if (window.guestName && !window.walletAddr) {
                // Guest mode: show score with name, no submit, still can view leaderboard
                inputRow.style.display = 'none';
                guestRow.style.display = 'block';
                guestRow.textContent = window.guestName + ' — ' + Number(scoreVal).toLocaleString() + ' pts  (connect wallet to save)';
            } else {
                inputRow.style.display = 'flex';
                guestRow.style.display = 'none';
            }
            panel.style.display = 'flex';
            applySessionUI();
        };

        // Called by game on restart
        window.mochiOnRestart = () => {
            document.getElementById('gl-panel').style.display = 'none';
            document.getElementById('gl-leaderboard-overlay').style.display = 'none';
            document.getElementById('gl-submit-btn').disabled = false;
            setStatus('');
            document.getElementById('gl-name').value = '';
        };

        // ─── Submit Score via MetaMask ─────────────────────────────────
        document.getElementById('gl-submit-btn').addEventListener('click', async () => {
            const nameInput = document.getElementById('gl-name');
            const rawName = nameInput.value.trim();
            const scoreVal = parseInt(document.getElementById('gl-panel').dataset.score || '0');
            const btn = document.getElementById('gl-submit-btn');
            const code = window.sessionCode;
            const maxLen = code ? MAX_NAME_SESSION : MAX_NAME_GLOBAL;

            if (rawName.length < 1 || rawName.length > maxLen) {
                setStatus('Name must be 1–' + maxLen + ' characters', '#ff2d78');
                return;
            }
            if (!window.ethereum) {
                setStatus('MetaMask not found — install it to submit on-chain', '#ff2d78');
                return;
            }

            const name = code ? code + ':' + rawName : rawName;

            btn.disabled = true;
            try {
                let walletAddr = window.walletAddr;
                if (!walletAddr) {
                    setStatus('Connecting wallet…');
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    walletAddr = accounts[0];
                    window.walletAddr = walletAddr;
                } else {
                    setStatus('Submitting…');
                }

                // Switch MetaMask to GenLayer testnet manually
                // (avoids the SDK's connect() which tries to install a MetaMask snap)
                setStatus('Switching to GenLayer network…');
                await ensureOnGenLayerChain();

                const writeClient = createClient({
                    chain: testnetBradbury,
                    account: walletAddr,
                    provider: window.ethereum
                });
                // Do NOT call writeClient.connect() — chain already switched above

                setStatus('Submitting… AI validators are reviewing your username ✦');
                const txHash = await writeClient.writeContract({
                    address: CONTRACT,
                    functionName: 'submit_score',
                    args: [name, scoreVal],
                    value: BigInt(0)
                });

                setStatus('TX sent — waiting for validator consensus…');
                await writeClient.waitForTransactionReceipt({
                    hash: txHash,
                    status: 'ACCEPTED',
                    interval: 5000,
                    retries: 60
                });
                setStatus('✓ Score saved on-chain!', '#39ff8e');
            } catch (err) {
                const msg = (err.message || String(err));
                if (msg.toLowerCase().includes('rejected') || msg.toLowerCase().includes('denied')) {
                    setStatus('Transaction rejected by user', '#ff6b6b');
                } else if (msg.toLowerCase().includes('username rejected')) {
                    setStatus('Username flagged by AI moderation', '#ff2d78');
                } else {
                    setStatus('Error: ' + msg.substring(0, 60), '#ff6b6b');
                }
                btn.disabled = false;
            }
        });

        document.getElementById('gl-board-btn').addEventListener('click', () => {
            document.getElementById('gl-leaderboard-overlay').style.display = 'flex';
            loadTopScores();
        });

        document.getElementById('gl-lb-close').addEventListener('click', () => {
            document.getElementById('gl-leaderboard-overlay').style.display = 'none';
        });
    </script>
</body>

</html>
