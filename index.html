<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mochi Surfer Game</title>
    <meta name="description" content="Cyberpunk skateboarding game with on-chain AI leaderboard powered by GenLayer" />
    <meta property="og:title" content="Mochi Surfer" />
    <meta property="og:description"
        content="Cyberpunk skateboarding game with on-chain AI leaderboard powered by GenLayer" />
    <meta property="og:image" content="https://mochi-surfer.vercel.app/og-preview.png" />
    <meta property="og:url" content="https://mochi-surfer.vercel.app" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mochi Surfer" />
    <meta name="twitter:description"
        content="Cyberpunk skateboarding game with on-chain AI leaderboard powered by GenLayer" />
    <meta name="twitter:image" content="https://mochi-surfer.vercel.app/og-preview.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050210;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        canvas {
            display: block;
            background: #0a0520;
            border: 1px solid rgba(180, 79, 255, 0.3);
            touch-action: none;
        }

        /* ─── GenLayer Blockchain UI ─────────────────────────── */
        #game-wrap {
            position: relative;
            width: 480px;
            height: 720px;
            transform-origin: top center;
            touch-action: none;
        }

        #gl-panel {
            position: absolute;
            bottom: 6px;
            left: 90px;
            width: 300px;
            background: rgba(8, 5, 26, 0.97);
            border: 1.5px solid rgba(180, 79, 255, 0.7);
            border-radius: 10px;
            padding: 8px 12px 10px;
            display: none;
            flex-direction: column;
            gap: 6px;
            font-family: 'Orbitron', Arial, sans-serif;
            z-index: 20;
            box-shadow: 0 0 18px rgba(180, 79, 255, 0.4);
        }

        .gl-title {
            color: rgba(0, 220, 255, 0.9);
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 2px;
            font-family: 'Orbitron', Arial, sans-serif;
            text-shadow: 0 0 8px rgba(0, 220, 255, 0.5);
        }

        #gl-input-row {
            display: flex;
            gap: 6px;
        }

        #gl-name {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(0, 220, 255, 0.35);
            border-radius: 6px;
            color: #ffffff;
            font-size: 12px;
            padding: 5px 8px;
            outline: none;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #gl-name::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        #gl-submit-btn {
            background: rgba(42, 8, 69, 0.9);
            border: 1.5px solid #b44fff;
            border-radius: 6px;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
            white-space: nowrap;
        }

        #gl-submit-btn:hover {
            background: rgba(80, 20, 120, 0.9);
        }

        #gl-submit-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* In-game profile chip (top-left, above canvas) */
        #hud-profile {
            display: none;
            position: absolute;
            top: 7px;
            left: 8px;
            z-index: 5;
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 8px;
            letter-spacing: 0.5px;
            color: rgba(0, 220, 255, 0.7);
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(0, 220, 255, 0.3);
            border-radius: 4px;
            padding: 3px 8px 3px 6px;
            cursor: pointer;
            max-width: 185px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.5;
            transition: border-color 0.2s, background 0.2s;
        }

        #hud-profile:hover {
            border-color: rgba(0, 220, 255, 0.7);
            background: rgba(0, 0, 0, 0.78);
        }

        #hud-profile .hud-uname {
            display: block;
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* My-score popup (shown when profile chip is tapped) */
        #my-score-toast {
            display: none;
            position: absolute;
            top: 62px;
            left: 8px;
            z-index: 30;
            font-family: 'Orbitron', Arial, sans-serif;
            background: rgba(5, 0, 18, 0.97);
            border: 1px solid rgba(0, 220, 255, 0.55);
            border-radius: 7px;
            padding: 8px 14px 10px;
            box-shadow: 0 0 16px rgba(0, 220, 255, 0.25);
            pointer-events: none;
            white-space: nowrap;
            line-height: 1.5;
        }

        #my-score-toast .mst-label {
            display: block;
            font-size: 7px;
            letter-spacing: 1.5px;
            color: rgba(0, 220, 255, 0.75);
            margin-bottom: 2px;
        }

        #my-score-toast .mst-score {
            display: block;
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 220, 255, 0.5);
        }

        #gl-status {
            color: rgba(180, 180, 180, 0.9);
            font-size: 10px;
            min-height: 14px;
            text-align: center;
        }

        #gl-board-btn {
            background: transparent;
            border: 1px solid rgba(0, 220, 255, 0.4);
            border-radius: 6px;
            color: rgba(0, 220, 255, 0.85);
            font-size: 11px;
            padding: 4px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #gl-board-btn:hover {
            background: rgba(0, 220, 255, 0.08);
        }

        /* Leaderboard full overlay */
        #gl-leaderboard-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.88);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }

        .gl-lb-card {
            background: #08051a;
            border: 1.5px solid #b44fff;
            border-radius: 14px;
            padding: 18px 22px;
            width: 320px;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: 0 0 24px rgba(180, 79, 255, 0.5);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .gl-lb-title {
            color: #ff2d78;
            font-size: 15px;
            font-weight: 900;
            text-align: center;
            font-family: 'Orbitron', Arial, sans-serif;
            letter-spacing: 2px;
            text-shadow: 0 0 12px #ff2d78;
        }

        .gl-lb-subtitle {
            color: rgba(0, 220, 255, 0.6);
            font-size: 10px;
            text-align: center;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        .gl-score-row {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            gap: 10px;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        .gl-rank {
            color: rgba(0, 220, 255, 0.7);
            font-size: 12px;
            font-weight: bold;
            width: 24px;
            flex-shrink: 0;
        }

        .gl-uname {
            color: #ffffff;
            font-size: 13px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .gl-score-val {
            color: #f4c010;
            font-size: 13px;
            font-weight: bold;
            flex-shrink: 0;
        }

        #gl-lb-close {
            margin-top: 4px;
            background: rgba(42, 8, 69, 0.9);
            border: 1.5px solid #b44fff;
            border-radius: 8px;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            padding: 8px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #gl-lb-close:hover {
            background: rgba(80, 20, 120, 0.9);
        }

        .gl-no-scores,
        .gl-loading {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            padding: 20px;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        .gl-loading {
            color: rgba(0, 220, 255, 0.7);
        }

        /* ─── Wallet Connect Overlay ─────────────────────────── */
        #wallet-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.93);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .wallet-card {
            background: #06030f;
            border: 1.5px solid #00dcff;
            border-radius: 16px;
            padding: 28px 24px 22px;
            width: 290px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            box-shadow: 0 0 28px rgba(0, 220, 255, 0.35);
            font-family: 'Orbitron', Arial, sans-serif;
        }

        .wallet-title {
            color: #00dcff;
            font-size: 18px;
            font-weight: 900;
            text-align: center;
            font-family: 'Orbitron', Arial, sans-serif;
            letter-spacing: 2px;
            text-shadow: 0 0 12px #00dcff;
        }

        .wallet-sub {
            color: rgba(180, 180, 220, 0.75);
            font-size: 12px;
            text-align: center;
        }

        #wallet-connect-btn {
            width: 100%;
            background: #002a30;
            border: 1.5px solid #00dcff;
            border-radius: 8px;
            color: #00dcff;
            font-size: 15px;
            font-weight: bold;
            padding: 13px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #wallet-connect-btn:hover {
            background: rgba(0, 220, 255, 0.1);
        }

        #wallet-connect-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* Wallet picker modal */
        #wallet-picker-backdrop {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 120;
            align-items: center;
            justify-content: center;
        }

        #wallet-picker-backdrop.open {
            display: flex;
        }

        #wallet-picker-modal {
            background: #0d0d1a;
            border: 1.5px solid rgba(0, 220, 255, 0.35);
            border-radius: 12px;
            padding: 20px 16px 16px;
            width: 88%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #wallet-picker-title {
            color: #00dcff;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        .wallet-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #e0e0ff;
            transition: background 0.15s;
        }

        .wallet-option:hover {
            background: rgba(0, 220, 255, 0.08);
            border-color: rgba(0, 220, 255, 0.4);
        }

        .wallet-option img {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            object-fit: contain;
        }

        .wallet-option-icon {
            font-size: 22px;
            line-height: 1;
        }

        #wallet-picker-cancel {
            background: transparent;
            border: none;
            color: rgba(180, 180, 200, 0.6);
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            padding: 4px;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #wallet-picker-no-wallet {
            display: none;
            font-size: 11px;
            color: rgba(180, 180, 180, 0.8);
            text-align: center;
            line-height: 1.6;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #wallet-overlay-status {
            color: rgba(180, 180, 180, 0.85);
            font-size: 11px;
            text-align: center;
            min-height: 16px;
        }

        #wallet-skip-btn {
            background: transparent;
            border: 1px solid rgba(180, 80, 255, 0.4);
            border-radius: 6px;
            color: rgba(180, 80, 255, 0.75);
            font-size: 12px;
            padding: 7px 18px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #wallet-skip-btn:hover {
            background: rgba(180, 80, 255, 0.08);
        }

        /* Session code section */
        .session-divider {
            width: 100%;
            border: none;
            border-top: 1px solid rgba(180, 80, 255, 0.2);
            margin: 0;
        }

        .session-label {
            color: rgba(180, 80, 255, 0.7);
            font-size: 10px;
            font-family: 'Orbitron', Arial, sans-serif;
            letter-spacing: 1.5px;
            text-align: center;
        }

        #session-row {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        #generate-code-btn {
            width: 100%;
            background: rgba(0, 180, 255, 0.08);
            border: 1.5px solid rgba(0, 200, 255, 0.5);
            border-radius: 8px;
            color: rgba(0, 220, 255, 0.9);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.06em;
            padding: 9px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #generate-code-btn:hover {
            background: rgba(0, 220, 255, 0.15);
        }

        #wallet-name-row {
            display: none;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            margin-top: 8px;
        }

        #wallet-name-row input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 180, 255, 0.06);
            border: 1px solid rgba(0, 200, 255, 0.35);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            padding: 6px 10px;
            outline: none;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #wallet-name-row input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #wallet-name-go-btn {
            width: 100%;
            background: rgba(0, 60, 80, 0.9);
            border: 1.5px solid #00dcff;
            border-radius: 6px;
            color: #00dcff;
            font-size: 12px;
            font-weight: bold;
            padding: 8px;
            cursor: pointer;
        }

        #guest-name-row {
            display: none;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }

        #guest-name-label {
            color: rgba(0, 220, 255, 0.7);
            font-size: 10px;
            font-family: 'Orbitron', Arial, sans-serif;
            letter-spacing: 1.5px;
            text-align: center;
        }

        #guest-name-input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 180, 255, 0.06);
            border: 1px solid rgba(0, 200, 255, 0.35);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            padding: 6px 10px;
            outline: none;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #guest-name-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #guest-confirm-btn {
            width: 100%;
            background: rgba(0, 60, 80, 0.9);
            border: 1.5px solid #00dcff;
            border-radius: 6px;
            color: #00dcff;
            font-size: 12px;
            font-weight: bold;
            padding: 8px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        #guest-confirm-btn:hover {
            background: rgba(0, 100, 130, 0.5);
        }

        #session-code-input {
            flex: 1;
            background: rgba(180, 80, 255, 0.06);
            border: 1px solid rgba(180, 80, 255, 0.4);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-family: 'Orbitron', Arial, sans-serif;
            letter-spacing: 2px;
            padding: 6px 8px;
            outline: none;
            text-transform: uppercase;
        }

        #session-code-input::placeholder {
            color: rgba(180, 80, 255, 0.35);
            font-family: 'Orbitron', Arial, sans-serif;
            letter-spacing: normal;
            font-size: 11px;
        }

        #session-join-btn {
            background: rgba(42, 8, 69, 0.9);
            border: 1.5px solid #b44fff;
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            padding: 6px 10px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
            white-space: nowrap;
        }

        #session-join-btn:hover {
            background: rgba(80, 20, 120, 0.9);
        }

        #session-status {
            font-size: 10px;
            text-align: center;
            min-height: 14px;
            color: rgba(180, 180, 180, 0.7);
        }

        /* Active session badge shown on submit panel */
        #gl-session-badge {
            display: none;
            font-size: 9px;
            font-family: 'Orbitron', Arial, sans-serif;
            letter-spacing: 1.5px;
            color: #b44fff;
            text-align: center;
            border: 1px solid rgba(180, 80, 255, 0.3);
            border-radius: 4px;
            padding: 2px 6px;
            background: rgba(180, 80, 255, 0.08);
        }
    </style>
    <!-- Firebase Realtime Database for cross-device multiplayer -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>

<body>
    <div id="game-wrap">
        <canvas id="gameCanvas" width="480" height="720"></canvas>

        <!-- Wallet connect screen (shown first) -->
        <div id="wallet-overlay">
            <div class="wallet-card">
                <div class="wallet-title">MOCHI SURFER</div>
                <div class="wallet-sub">Connect wallet to save your scores to the leaderboard</div>
                <button id="wallet-connect-btn">⬡ Connect Wallet</button>
                <div id="wallet-overlay-status"></div>

                <!-- Name input (shown after wallet connect) -->
                <div id="wallet-name-row">
                    <div
                        style="font-size:9px;letter-spacing:1.5px;color:rgba(0,220,255,0.7);font-family:'Orbitron',Arial,sans-serif;text-align:center;">
                        YOUR DISPLAY NAME</div>
                    <input id="wallet-name-input" type="text" maxlength="20" placeholder="Enter your name…"
                        autocomplete="off" spellcheck="false">
                    <button id="wallet-name-go-btn">Start Playing →</button>
                </div>

                <!-- Wallet picker modal (inside overlay card) -->
                <div id="wallet-picker-backdrop">
                    <div id="wallet-picker-modal">
                        <div id="wallet-picker-title">CHOOSE WALLET</div>
                        <div id="wallet-picker-list"></div>
                        <div id="wallet-picker-no-wallet">
                            No browser wallet detected.<br>
                            Install <a href="https://metamask.io" target="_blank" rel="noopener"
                                style="color:#00dcff">MetaMask</a> or another EVM extension, then refresh.
                        </div>
                        <button id="wallet-picker-cancel">Cancel</button>
                    </div>
                </div>
                <button id="wallet-skip-btn">Play without wallet</button>
                <hr class="session-divider">
                <div class="session-label">TOURNAMENT CODE</div>
                <div id="session-row">
                    <input id="session-code-input" type="text" maxlength="6" placeholder="Paste code here…"
                        autocomplete="off" spellcheck="false">
                    <button id="session-join-btn">Join</button>
                </div>
                <button id="generate-code-btn" title="Create a new tournament room">Create Room</button>
                <div id="session-status"></div>
                <!-- Guest username (shown when in a session + no wallet) -->
                <div id="guest-name-row">
                    <div class="session-divider" style="margin:0"></div>
                    <div id="guest-name-label">YOUR TOURNAMENT NAME</div>
                    <input id="guest-name-input" type="text" maxlength="13" placeholder="Enter your display name…"
                        autocomplete="off" spellcheck="false">
                    <button id="guest-confirm-btn">Play as Guest →</button>
                </div>
            </div>
        </div>

        <!-- In-game profile chip -->
        <div id="hud-profile"></div>
        <!-- My-score popup (shown on chip tap) -->
        <div id="my-score-toast"></div>

        <!-- Tournament players panel (side panel, shown when session active) -->
        <div id="tournament-players-panel"
            style="display:none;position:absolute;top:44px;right:4px;width:130px;background:rgba(8,5,26,0.93);border:1px solid rgba(180,80,255,0.5);border-radius:8px;padding:7px 8px;z-index:15;font-family:Arial,sans-serif;">
            <div
                style="font-size:8px;letter-spacing:1.5px;color:rgba(0,220,255,0.7);font-family:'Orbitron',Arial,sans-serif;margin-bottom:5px;text-align:center;">
                PLAYERS IN ROOM</div>
            <div id="tournament-players-list"
                style="font-size:11px;color:rgba(200,200,220,0.85);display:flex;flex-direction:column;gap:3px;"></div>
        </div>

        <!-- GenLayer blockchain submit panel (shown on game over) -->
        <div id="gl-panel">
            <div id="gl-session-badge"></div>
            <!-- wallet submit -->
            <div id="gl-input-row">
                <input id="gl-name" type="text" maxlength="20" placeholder="Your name…" autocomplete="off"
                    spellcheck="false" />
                <button id="gl-submit-btn">Submit</button>
            </div>
            <!-- guest score line (no wallet) -->
            <div id="gl-guest-row" style="display:none;font-size:11px;text-align:center;color:rgba(0,220,255,0.8);">
            </div>
            <div id="gl-best-row"
                style="display:none;font-size:11px;text-align:center;color:#b44fff;font-family:'Orbitron',Arial,sans-serif;letter-spacing:1px;">
            </div>
            <button id="gl-submit-best-btn"
                style="display:none;background:rgba(42,8,69,0.9);border:1.5px solid #b44fff;border-radius:6px;color:#fff;font-size:11px;font-weight:bold;padding:6px 10px;cursor:pointer;font-family:Arial,sans-serif;">⬡
                Submit Best Score to Chain</button>
            <div id="gl-status"></div>
            <button id="gl-board-btn">View Leaderboard</button>
        </div>

        <!-- Full-screen leaderboard overlay -->
        <div id="gl-leaderboard-overlay">
            <div class="gl-lb-card">
                <div class="gl-lb-title">TOP SCORES</div>
                <div class="gl-lb-subtitle" id="gl-lb-subtitle">Global leaderboard</div>
                <div id="gl-scores-list"></div>
                <button id="gl-lb-close">✕ Close</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const W = canvas.width;
        const H = canvas.height;

        // ─── Game State ───────────────────────────────────────────────
        let lastTime = 0;
        let animFrameId = null;
        let score = 0;
        let elapsedTime = 0;
        let highScore = 0;
        const MAX_SPEED = 1.4;
        const SESSION_DURATION_TOURNAMENT = 180; // 3 minutes tournament
        let sessionTimeLeft = SESSION_DURATION_TOURNAMENT;
        // Solo = endless run (no timer). Tournament = 3 min countdown.
        function getSessionDuration() { return SESSION_DURATION_TOURNAMENT; }

        // ─── Screen Shake ─────────────────────────────────────────────
        let shakeTimer = 0;
        const SHAKE_DURATION = 400;
        let shakeMag = 0;

        function triggerShake(mag) { shakeTimer = SHAKE_DURATION; shakeMag = mag; }

        function getShakeOffset() {
            if (shakeTimer <= 0) return { sx: 0, sy: 0 };
            const t = shakeTimer / SHAKE_DURATION;
            const s = shakeMag * t;
            return { sx: (Math.random() - 0.5) * s * 2, sy: (Math.random() - 0.5) * s * 2 };
        }

        // ─── Particles ────────────────────────────────────────────────
        let particles = [];

        function spawnCoinPop(x, y) {
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 * i) / 8;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * (60 + Math.random() * 60),
                    vy: Math.sin(angle) * (60 + Math.random() * 60) - 40,
                    life: 1.0,
                    decay: 1.8 + Math.random(),
                    r: 4 + Math.random() * 3,
                    color: ["#00e5ff", "#b44fff", "#ff2d78", "#ffffff"][Math.floor(Math.random() * 4)]
                });
            }
        }

        function updateParticles(dt) {
            const sec = dt / 1000;
            for (const p of particles) {
                p.x += p.vx * sec;
                p.y += p.vy * sec;
                p.vy += 300 * sec;
                p.life -= p.decay * sec;
            }
            particles = particles.filter(p => p.life > 0);
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ─── Milestone Banner ─────────────────────────────────────────
        let banner = null;
        const MILESTONES = new Set([100, 250, 500, 1000, 2000, 3000, 5000]);
        let lastMilestone = 0;

        function checkMilestone() {
            for (const m of MILESTONES) {
                if (score >= m && lastMilestone < m) {
                    lastMilestone = m;
                    banner = { text: m + " PTS!", timer: 1800, maxTimer: 1800, color: "#00e5ff" };
                }
            }
            if (!window._speed50shown && elapsedTime > 5000) {
                const speedPct = (gameSpeed - 0.4) / (MAX_SPEED - 0.4);
                if (speedPct >= 0.5) {
                    window._speed50shown = true;
                    banner = { text: "SPEEDING UP!", timer: 1500, maxTimer: 1500, color: "#ff2d78" };
                }
            }
        }

        function updateBanner(dt) {
            if (banner) { banner.timer -= dt; if (banner.timer <= 0) banner = null; }
        }

        function drawBanner() {
            if (!banner) return;
            const t = banner.timer / banner.maxTimer;
            const alpha = t < 0.2 ? t / 0.2 : 1;
            const scale = 1 + (1 - t) * 0.3;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(W / 2, H * 0.25);
            ctx.scale(scale, scale);
            ctx.textAlign = "center";
            ctx.font = "bold 28px 'Orbitron', Arial";
            const tw = ctx.measureText(banner.text).width + 40;
            // Pill background with gradient
            const pillGrad = ctx.createLinearGradient(-tw / 2, 0, tw / 2, 0);
            pillGrad.addColorStop(0, 'rgba(5,0,18,0.85)');
            pillGrad.addColorStop(0.5, 'rgba(10,0,30,0.9)');
            pillGrad.addColorStop(1, 'rgba(5,0,18,0.85)');
            ctx.fillStyle = pillGrad;
            ctx.beginPath(); ctx.roundRect(-tw / 2, -28, tw, 42, 10); ctx.fill();
            // Double border
            ctx.shadowColor = banner.color; ctx.shadowBlur = 22;
            ctx.strokeStyle = banner.color; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(-tw / 2, -28, tw, 42, 10); ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(-tw / 2 + 3, -25, tw - 6, 36, 8); ctx.stroke();
            // Text with glow
            ctx.shadowColor = banner.color; ctx.shadowBlur = 18;
            ctx.fillStyle = banner.color;
            ctx.fillText(banner.text, 0, 2);
            ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
            ctx.restore();
        }

        // ─── Player trail ─────────────────────────────────────────────
        let trail = [];

        function updateTrail() {
            if (gameState !== 'playing') return;
            trail.unshift({ x: player.x, y: PLAYER_Y_BASE + player.jumpY });
            if (trail.length > 10) trail.pop();
        }

        function drawTrail() {
            if (!player.jumping) return;
            for (let i = 0; i < trail.length; i++) {
                const t = trail[i];
                const frac = 1 - i / trail.length;
                const alpha = frac * 0.45;
                // Alternate cyan / purple for a neon streak
                const color = i % 2 === 0 ? "#00e5ff" : "#b44fff";
                const rx = Math.max(0.5, 11 - i);
                const ry = Math.max(0.5, 5.5 - i * 0.4);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowColor = color;
                ctx.shadowBlur = 8 * frac;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(t.x, t.y, rx, ry, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ─── Track / Perspective Settings ────────────────────────────
        const HORIZON_Y = H * 0.38;       // where the track vanishes (horizon line)
        const GROUND_Y = H;              // bottom of the canvas
        const TRACK_LEFT_TOP = W * 0.3; // left edge of track at horizon
        const TRACK_RIGHT_TOP = W * 0.7;
        const TRACK_LEFT_BOT = W * 0.0; // left edge of track at bottom
        const TRACK_RIGHT_BOT = W * 1.0;

        // Lane dividers: 2 lines splitting track into 3 lanes
        // Positions are fractions across the track width (at top and bottom)
        const LANE_FRACS = [1 / 3, 2 / 3]; // two divider lines

        // Scrolling lines (horizontal lines that move downward = forward motion)
        const NUM_SCROLL_LINES = 12;
        let scrollOffset = 0;           // 0 to 1, loops
        let gameSpeed = 0.4;            // controls track scroll + obstacle speed (increases over time)

        // ─── Helper: get X position at a given Y on the track edges ──
        function trackX(frac, y) {
            // frac 0 = left edge, 1 = right edge, interpolated by y
            const t = (y - HORIZON_Y) / (GROUND_Y - HORIZON_Y); // 0 at top, 1 at bottom
            const left = TRACK_LEFT_TOP + (TRACK_LEFT_BOT - TRACK_LEFT_TOP) * t;
            const right = TRACK_RIGHT_TOP + (TRACK_RIGHT_BOT - TRACK_RIGHT_TOP) * t;
            return left + (right - left) * frac;
        }

        // ─── Update ───────────────────────────────────────────────────
        function update(dt) {
            if (gameState !== 'playing') return;
            const sec = dt / 1000;
            elapsedTime += dt;

            // Countdown timer only active in tournament mode
            if (window.sessionCode) {
                sessionTimeLeft -= sec;
                if (sessionTimeLeft <= 0) {
                    sessionTimeLeft = 0;
                    if (score > highScore) highScore = Math.floor(score);
                    gameOver = true;
                    gameState = 'gameover';
                    window._tournamentRunDone = true;
                    triggerShake(10);
                    if (typeof window.mochiOnGameOver === 'function') window.mochiOnGameOver(Math.floor(score));
                    return;
                }
            }

            // Score: distance points + coin bonus
            score += gameSpeed * 1.8 * sec;

            // Difficulty ramp: speed increases every 8 seconds, capped at MAX_SPEED
            gameSpeed = Math.min(MAX_SPEED, 0.4 + (elapsedTime / 1000) * 0.018);

            // Advance scroll offset, loop back
            scrollOffset = (scrollOffset + gameSpeed * sec) % 1;
            updatePlayer(dt);
            updateObstacles(dt);
            updateCoins(dt);
            updateParticles(dt);
            updateBanner(dt);
            updateTrail();
            checkCollisions();
            checkMilestone();
            if (shakeTimer > 0) shakeTimer -= dt;
        }

        // ─── City Buildings ───────────────────────────────────────────
        const FAR_BUILDINGS = (function () {
            const rng = (a, b) => a + Math.random() * (b - a);
            const cols = [];
            let x = -20;
            while (x < W + 20) {
                const bw = rng(28, 65);
                const bh = rng(50, HORIZON_Y * 0.88);
                const wrows = Math.floor(bh / 14);
                const wcols = Math.max(1, Math.floor(bw / 13));
                const wins = [];
                for (let r = 0; r < wrows; r++)
                    for (let c = 0; c < wcols; c++)
                        wins.push({ r, c, lit: Math.random() < 0.55 });
                // Rooftop style: 0=flat, 1=antenna, 2=stepped, 3=dome
                const roofStyle = Math.floor(Math.random() * 4);
                // Side face: random narrow depth illusion
                const sideW = rng(4, 12);
                cols.push({ x, w: bw, h: bh, wins, roofStyle, sideW });
                x += bw + rng(4, 14);
            }
            return cols;
        }());

        const NEAR_BUILDINGS = (function () {
            const rng = (a, b) => a + Math.random() * (b - a);
            const cols = [];
            let x = -30;
            while (x < W + 40) {
                const bw = rng(42, 90);
                const bh = rng(HORIZON_Y * 0.4, HORIZON_Y * 1.1);
                const wrows = Math.floor(bh / 16);
                const wcols = Math.max(1, Math.floor(bw / 15));
                const wins = [];
                for (let r = 0; r < wrows; r++)
                    for (let c = 0; c < wcols; c++)
                        wins.push({ r, c, lit: Math.random() < 0.5 });
                const roofStyle = Math.floor(Math.random() * 4);
                const sideW = rng(6, 18);
                cols.push({ x, w: bw, h: bh, wins, roofStyle, sideW });
                x += bw + rng(6, 22);
            }
            return cols;
        }());

        let cityScrollFar = 0;
        let cityScrollNear = 0;
        const NEON_COLORS = ["#ff2d78", "#b44fff", "#00e5ff", "#39ff14", "#ff9500"];

        function drawBuildings(buildings, scrollX, alpha, winW, winH, gap, isNear) {
            ctx.save();
            ctx.globalAlpha = alpha;
            const totalW = buildings[buildings.length - 1].x + buildings[buildings.length - 1].w + 40;

            for (let pass = 0; pass < 2; pass++) {
                const baseX = pass * totalW - scrollX % totalW;
                for (const b of buildings) {
                    const bx = baseX + b.x;
                    const by = HORIZON_Y - b.h;
                    if (bx + b.w + b.sideW < 0 || bx > W) continue;

                    // ── Side face (3D depth illusion) ──
                    const sideColor = isNear ? "#0e2038" : "#0a1828";
                    ctx.fillStyle = sideColor;
                    ctx.beginPath();
                    ctx.moveTo(bx + b.w, by);
                    ctx.lineTo(bx + b.w + b.sideW, by - b.sideW * 0.4);
                    ctx.lineTo(bx + b.w + b.sideW, HORIZON_Y - b.sideW * 0.4);
                    ctx.lineTo(bx + b.w, HORIZON_Y);
                    ctx.closePath();
                    ctx.fill();
                    // Side face edge highlight
                    ctx.strokeStyle = "rgba(180,80,255,0.12)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(bx + b.w, by);
                    ctx.lineTo(bx + b.w + b.sideW, by - b.sideW * 0.4);
                    ctx.stroke();

                    // ── Building front face ──
                    // Gradient: slightly lighter at top for depth
                    const bgrad = ctx.createLinearGradient(bx, by, bx, HORIZON_Y);
                    bgrad.addColorStop(0, isNear ? "#1e3a5a" : "#162e4a");
                    bgrad.addColorStop(1, isNear ? "#122840" : "#0e1e36");
                    ctx.fillStyle = bgrad;
                    ctx.fillRect(bx, by, b.w, b.h);

                    // Thin vertical edge line (corner light)
                    ctx.strokeStyle = "rgba(100,60,200,0.2)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(bx + b.w, by); ctx.lineTo(bx + b.w, HORIZON_Y);
                    ctx.stroke();

                    // ── Roof line accent ──
                    ctx.fillStyle = isNear ? "rgba(180,80,255,0.35)" : "rgba(140,60,220,0.2)";
                    ctx.fillRect(bx, by, b.w, 2);

                    // Rooftop 3D ledge
                    ctx.fillStyle = isNear ? "#253c60" : "#1a2e4a";
                    ctx.fillRect(bx - 2, by - 4, b.w + 4, 5);
                    ctx.fillStyle = isNear ? "#2e4870" : "#1e3555";
                    ctx.fillRect(bx - 2, by - 4, b.w + 4, 1);

                    // ── Roof details ──
                    const rcx = bx + b.w / 2;
                    if (b.roofStyle === 1) {
                        // Antenna
                        ctx.strokeStyle = "rgba(200,150,255,0.6)";
                        ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.moveTo(rcx, by - 4); ctx.lineTo(rcx, by - 18); ctx.stroke();
                        ctx.fillStyle = "#ff2d78";
                        ctx.shadowColor = "#ff2d78"; ctx.shadowBlur = 6;
                        ctx.beginPath(); ctx.arc(rcx, by - 18, 2, 0, Math.PI * 2); ctx.fill();
                        ctx.shadowBlur = 0;
                    } else if (b.roofStyle === 2) {
                        // Stepped pyramid top
                        ctx.fillStyle = isNear ? "#1c1230" : "#120c22";
                        ctx.fillRect(bx + b.w * 0.1, by - 8, b.w * 0.8, 5);
                        ctx.fillRect(bx + b.w * 0.25, by - 14, b.w * 0.5, 6);
                        ctx.fillStyle = "rgba(180,80,255,0.25)";
                        ctx.fillRect(bx + b.w * 0.1, by - 8, b.w * 0.8, 1);
                        ctx.fillRect(bx + b.w * 0.25, by - 14, b.w * 0.5, 1);
                    } else if (b.roofStyle === 3) {
                        // Dome/orb
                        ctx.fillStyle = "#0d0820";
                        ctx.beginPath();
                        ctx.ellipse(rcx, by - 4, b.w * 0.22, b.w * 0.14, 0, Math.PI, 0);
                        ctx.fill();
                        ctx.strokeStyle = "rgba(0,220,255,0.3)";
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.ellipse(rcx, by - 4, b.w * 0.22, b.w * 0.14, 0, Math.PI, 0);
                        ctx.stroke();
                    }

                    // ── Windows ──
                    for (const w of b.wins) {
                        const wx = bx + gap + w.c * (winW + gap);
                        const wy = by + gap + w.r * (winH + gap);
                        if (wx + winW > bx + b.w - 2 || wy + winH > HORIZON_Y - 2) continue;
                        if (w.lit) {
                            // Randomly flicker neon
                            if (Math.random() < 0.001) w.lit = false;
                            const wColor = Math.random() < 0.04
                                ? NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)]
                                : "rgba(255,240,160,0.88)";
                            ctx.fillStyle = wColor;
                            ctx.fillRect(wx, wy, winW, winH);
                            // Window glow
                            ctx.shadowColor = wColor;
                            ctx.shadowBlur = 4;
                            ctx.fillRect(wx, wy, winW, winH);
                            ctx.shadowBlur = 0;
                        } else {
                            if (Math.random() < 0.0005) w.lit = true;
                            ctx.fillStyle = "rgba(20,15,40,0.7)";
                            ctx.fillRect(wx, wy, winW, winH);
                        }
                    }

                    // ── Occasional neon sign on building face ──
                    if (isNear && b.w > 50 && Math.random() < 0.003) {
                        const signColor = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
                        ctx.shadowColor = signColor; ctx.shadowBlur = 10;
                        ctx.strokeStyle = signColor; ctx.lineWidth = 2;
                        ctx.strokeRect(bx + b.w * 0.15, by + b.h * 0.25, b.w * 0.7, b.h * 0.12);
                        ctx.shadowBlur = 0;
                    }
                }
            }
            ctx.restore();
        }

        // ─── Draw Track ───────────────────────────────────────────────
        function drawTrack() {
            // ── Sky gradient — deeper, richer ──
            const sky = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
            sky.addColorStop(0, "#050d20");
            sky.addColorStop(0.45, "#0c1535");
            sky.addColorStop(0.85, "#1a1040");
            sky.addColorStop(1, "#281445");
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, HORIZON_Y);

            // ── Moon ──
            ctx.save();
            ctx.shadowColor = "rgba(180,220,255,0.6)";
            ctx.shadowBlur = 24;
            const moonGrad = ctx.createRadialGradient(W * 0.78, HORIZON_Y * 0.18, 0, W * 0.78, HORIZON_Y * 0.18, 18);
            moonGrad.addColorStop(0, "rgba(230,240,255,0.95)");
            moonGrad.addColorStop(0.6, "rgba(180,200,255,0.7)");
            moonGrad.addColorStop(1, "rgba(100,140,220,0)");
            ctx.fillStyle = moonGrad;
            ctx.beginPath(); ctx.arc(W * 0.78, HORIZON_Y * 0.18, 18, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            // ── Stars — layered brightness ──
            for (let i = 0; i < 80; i++) {
                const sx = ((Math.sin(i * 127.1) * 0.5 + 0.5) * W) | 0;
                const sy = ((Math.sin(i * 311.7) * 0.5 + 0.5) * HORIZON_Y * 0.88) | 0;
                const sr = (Math.sin(i * 74.3) * 0.5 + 0.5) * 1.4 + 0.2;
                const twinkle = 0.4 + Math.sin(Date.now() * 0.001 * (1 + (i % 5)) + i) * 0.35;
                ctx.fillStyle = i % 7 === 0 ? `rgba(180,210,255,${twinkle.toFixed(2)})` : `rgba(255,255,255,${(twinkle * 0.7).toFixed(2)})`;
                ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
            }

            // ── Distant city glow behind buildings ──
            const cityGlow = ctx.createRadialGradient(W / 2, HORIZON_Y, 0, W / 2, HORIZON_Y, W * 0.75);
            cityGlow.addColorStop(0, "rgba(140,0,255,0.18)");
            cityGlow.addColorStop(0.4, "rgba(255,40,120,0.09)");
            cityGlow.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = cityGlow;
            ctx.fillRect(0, HORIZON_Y * 0.3, W, HORIZON_Y * 0.7);

            // ── Far city buildings (slow parallax) ──
            cityScrollFar += gameSpeed * 0.4;
            drawBuildings(FAR_BUILDINGS, cityScrollFar, 0.65, 4, 5, 3, false);

            // ── Mid atmospheric fog layer ──
            const fog = ctx.createLinearGradient(0, HORIZON_Y * 0.55, 0, HORIZON_Y);
            fog.addColorStop(0, "rgba(10,5,30,0)");
            fog.addColorStop(1, "rgba(22,8,45,0.45)");
            ctx.fillStyle = fog;
            ctx.fillRect(0, HORIZON_Y * 0.55, W, HORIZON_Y * 0.45);

            // ── Near city buildings (faster parallax) ──
            cityScrollNear += gameSpeed * 1.1;
            drawBuildings(NEAR_BUILDINGS, cityScrollNear, 0.92, 5, 7, 4, true);

            // ── Purple/pink city glow on horizon ──
            const glowGrad = ctx.createLinearGradient(0, HORIZON_Y - 30, 0, HORIZON_Y + 10);
            glowGrad.addColorStop(0, "rgba(160,0,255,0.0)");
            glowGrad.addColorStop(0.4, "rgba(180,0,255,0.28)");
            glowGrad.addColorStop(1, "rgba(255,50,120,0.42)");
            ctx.fillStyle = glowGrad;
            ctx.fillRect(0, HORIZON_Y - 30, W, 40);

            // ── Ground / track surface ──
            const ground = ctx.createLinearGradient(0, HORIZON_Y, 0, GROUND_Y);
            ground.addColorStop(0, "#2e2050");
            ground.addColorStop(0.4, "#1c1038");
            ground.addColorStop(1, "#0c0820");
            ctx.fillStyle = ground;
            ctx.beginPath();
            ctx.moveTo(TRACK_LEFT_TOP, HORIZON_Y);
            ctx.lineTo(TRACK_RIGHT_TOP, HORIZON_Y);
            ctx.lineTo(TRACK_RIGHT_BOT, GROUND_Y);
            ctx.lineTo(TRACK_LEFT_BOT, GROUND_Y);
            ctx.closePath();
            ctx.fill();

            // ── Ground side panels (3D pavement edge) ──
            // Left gutter
            const leftGutter = ctx.createLinearGradient(0, HORIZON_Y, 0, GROUND_Y);
            leftGutter.addColorStop(0, "#0e0820"); leftGutter.addColorStop(1, "#060410");
            ctx.fillStyle = leftGutter;
            ctx.beginPath();
            ctx.moveTo(0, HORIZON_Y); ctx.lineTo(TRACK_LEFT_TOP, HORIZON_Y);
            ctx.lineTo(TRACK_LEFT_BOT, GROUND_Y); ctx.lineTo(0, GROUND_Y);
            ctx.closePath(); ctx.fill();
            // Right gutter
            ctx.fillStyle = leftGutter;
            ctx.beginPath();
            ctx.moveTo(W, HORIZON_Y); ctx.lineTo(TRACK_RIGHT_TOP, HORIZON_Y);
            ctx.lineTo(TRACK_RIGHT_BOT, GROUND_Y); ctx.lineTo(W, GROUND_Y);
            ctx.closePath(); ctx.fill();

            // ── Neon scrolling grid lines ──
            for (let i = 0; i < NUM_SCROLL_LINES; i++) {
                let frac = (i / NUM_SCROLL_LINES + scrollOffset) % 1;
                let pFrac = frac * frac;
                let y = HORIZON_Y + (GROUND_Y - HORIZON_Y) * pFrac;
                let x0 = trackX(0, y);
                let x1 = trackX(1, y);
                const alpha = 0.06 + pFrac * 0.22;
                ctx.strokeStyle = `rgba(160,80,255,${alpha.toFixed(2)})`;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
            }

            // ── Track center reflection stripe ──
            const refl = ctx.createLinearGradient(0, HORIZON_Y, 0, GROUND_Y);
            refl.addColorStop(0, "rgba(180,80,255,0.0)");
            refl.addColorStop(0.5, "rgba(180,80,255,0.06)");
            refl.addColorStop(1, "rgba(180,80,255,0.0)");
            ctx.fillStyle = refl;
            const midL0 = trackX(0.45, HORIZON_Y), midR0 = trackX(0.55, HORIZON_Y);
            const midLB = trackX(0.45, GROUND_Y), midRB = trackX(0.55, GROUND_Y);
            ctx.beginPath();
            ctx.moveTo(midL0, HORIZON_Y); ctx.lineTo(midR0, HORIZON_Y);
            ctx.lineTo(midRB, GROUND_Y); ctx.lineTo(midLB, GROUND_Y);
            ctx.closePath(); ctx.fill();

            // ── Lane dividers — cyan neon dashes ──
            ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 6;
            ctx.strokeStyle = "rgba(0,220,255,0.6)";
            ctx.lineWidth = 2;
            ctx.setLineDash([18, 14]);
            for (const frac of LANE_FRACS) {
                ctx.beginPath();
                ctx.moveTo(trackX(frac, HORIZON_Y), HORIZON_Y);
                ctx.lineTo(trackX(frac, GROUND_Y), GROUND_Y);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            // ── Outer track edges — purple neon ──
            ctx.shadowColor = "#b44fff"; ctx.shadowBlur = 12;
            ctx.strokeStyle = "rgba(180,80,255,0.9)";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(TRACK_LEFT_TOP, HORIZON_Y); ctx.lineTo(TRACK_LEFT_BOT, GROUND_Y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(TRACK_RIGHT_TOP, HORIZON_Y); ctx.lineTo(TRACK_RIGHT_BOT, GROUND_Y); ctx.stroke();
            ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

            // ── Horizon neon line ──
            ctx.shadowColor = "#ff2d78"; ctx.shadowBlur = 14;
            ctx.strokeStyle = "rgba(255,45,120,0.85)";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, HORIZON_Y); ctx.lineTo(W, HORIZON_Y); ctx.stroke();
            ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
        }

        // ─── Player ───────────────────────────────────────────────────
        // Lanes: 0=left, 1=center, 2=right
        const PLAYER_Y_BASE = H * 0.78;   // feet level on screen
        const PLAYER_W = 36;
        const PLAYER_H = 54;
        const SLIDE_H = 28;              // height when sliding

        const player = {
            lane: 1,                      // current lane (0,1,2)
            targetLane: 1,               // lane we're moving to
            x: 0,                        // calculated each frame
            y: PLAYER_Y_BASE,

            // Lane switching
            laneX: 0,                    // current visual x (interpolates to target)
            targetX: 0,                  // target x for current lane
            laneSpeed: 10,               // how fast to slide between lanes (lerp factor)

            // Jump
            jumping: false,
            jumpVY: 0,                   // vertical velocity (pixels/sec)
            jumpY: 0,                    // offset upward from base y
            JUMP_FORCE: -520,
            GRAVITY: 1400,

            // Slide
            sliding: false,
            slideTimer: 0,               // countdown in ms
            SLIDE_DURATION: 600,

            // State: 'run' | 'jump' | 'slide'
            get state() {
                if (this.jumping) return 'jump';
                if (this.sliding) return 'slide';
                return 'run';
            },

            // Running animation
            runFrame: 0,
            runTimer: 0,
        };

        // Centre X of each lane at the player's Y level
        function laneXAt(lane, y) {
            // Lane fractions: 0→0/3..1/3, 1→1/3..2/3, 2→2/3..3/3, centre = mid
            const fracs = [1 / 6, 3 / 6, 5 / 6];
            return trackX(fracs[lane], y);
        }

        // ─── Input ────────────────────────────────────────────────────
        const keys = {};
        window.addEventListener("keydown", (e) => {
            if (keys[e.code]) return; // ignore held keys
            keys[e.code] = true;

            if (e.code === "ArrowLeft" || e.code === "KeyA") {
                if (player.targetLane > 0) player.targetLane--;
            }
            if (e.code === "ArrowRight" || e.code === "KeyD") {
                if (player.targetLane < 2) player.targetLane++;
            }
            if ((e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Space") && !player.jumping) {
                player.jumping = true;
                player.jumpVY = player.JUMP_FORCE;
                player.sliding = false;
            }
            if ((e.code === "ArrowDown" || e.code === "KeyS") && !player.jumping) {
                player.sliding = true;
                player.slideTimer = player.SLIDE_DURATION;
            }
        });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        // ─── Touch / Swipe Controls ───────────────────────────────────
        let touchStartX = 0, touchStartY = 0, touchHandled = false;
        const SWIPE_THRESHOLD = 25;

        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            touchStartX = e.changedTouches[0].clientX;
            touchStartY = e.changedTouches[0].clientY;
            touchHandled = false;
        }, { passive: false });

        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            if (touchHandled || gameState !== 'playing') return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx), absDy = Math.abs(dy);
            if (absDx >= SWIPE_THRESHOLD && absDx > absDy) {
                touchHandled = true;
                if (dx < 0) { if (player.targetLane > 0) player.targetLane--; }
                else { if (player.targetLane < 2) player.targetLane++; }
            } else if (absDy >= SWIPE_THRESHOLD && absDy > absDx) {
                touchHandled = true;
                if (dy > 0) {
                    if (!player.jumping) { player.sliding = true; player.slideTimer = player.SLIDE_DURATION; }
                } else {
                    if (!player.jumping) { player.jumping = true; player.jumpVY = player.JUMP_FORCE; player.sliding = false; }
                }
            }
        }, { passive: false });

        canvas.addEventListener("touchend", (e) => {
            e.preventDefault();
            if (gameState === 'start') { resetGame(); return; }
            if (gameState === 'gameover') {
                const pos = getCanvasPos(e);
                if (isInsideBtn(pos, restartBtn) && !window._tournamentRunDone && !window.sessionCode) resetGame();
                return;
            }
            if (!touchHandled) {
                if (!player.jumping) { player.jumping = true; player.jumpVY = player.JUMP_FORCE; player.sliding = false; }
            }
        }, { passive: false });

        // ─── Update Player ────────────────────────────────────────────
        function updatePlayer(dt) {
            const sec = dt / 1000;

            // Target X for current lane
            player.targetX = laneXAt(player.targetLane, PLAYER_Y_BASE);

            // Smoothly slide player X toward target (lerp)
            player.laneX += (player.targetX - player.laneX) * Math.min(1, player.laneSpeed * sec);
            player.x = player.laneX;

            // Jump physics
            if (player.jumping) {
                player.jumpVY += player.GRAVITY * sec;
                player.jumpY += player.jumpVY * sec;
                if (player.jumpY >= 0) {
                    player.jumpY = 0;
                    player.jumpVY = 0;
                    player.jumping = false;
                }
            }

            // Slide timer
            if (player.sliding) {
                player.slideTimer -= dt;
                if (player.slideTimer <= 0) {
                    player.sliding = false;
                    player.slideTimer = 0;
                }
            }

            // Running frame animation (leg swing)
            player.runTimer += dt;
            if (player.runTimer > 120) {
                player.runTimer = 0;
                player.runFrame = (player.runFrame + 1) % 4;
            }
        }

        // ─── Mochi Drawing Helpers ────────────────────────────────────────
        function mochiBoard(cx, py, scale) {
            const bw = 48 * scale;
            const wr = 6 * scale;

            // Wheels — bright with cyan hub glow
            for (const wx of [cx - bw / 2 + 9 * scale, cx + bw / 2 - 9 * scale]) {
                // Wheel outer
                ctx.fillStyle = "#888";
                ctx.beginPath();
                ctx.arc(wx, py - wr * 0.6, wr, 0, Math.PI * 2);
                ctx.fill();
                // Wheel inner (cyan glowing hub)
                ctx.shadowColor = "#00e5ff";
                ctx.shadowBlur = 8;
                ctx.fillStyle = "#00e5ff";
                ctx.beginPath();
                ctx.arc(wx, py - wr * 0.6, wr * 0.38, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Deck body — dark wood with purple neon glow
            ctx.shadowColor = "#b44fff";
            ctx.shadowBlur = 14;
            ctx.fillStyle = "#3a1060";
            ctx.beginPath();
            ctx.roundRect(cx - bw / 2, py - 14, bw, 8, 4);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Deck top edge — bright purple neon stripe
            ctx.shadowColor = "#d060ff";
            ctx.shadowBlur = 10;
            ctx.strokeStyle = "#d060ff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(cx - bw / 2, py - 14, bw, 8, 4);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.shadowColor = "transparent";

            // Grip tape texture (two cyan lines across deck)
            ctx.strokeStyle = "rgba(0,220,255,0.45)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx - bw / 2 + 4, py - 11);
            ctx.lineTo(cx + bw / 2 - 4, py - 11);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx - bw / 2 + 4, py - 9);
            ctx.lineTo(cx + bw / 2 - 4, py - 9);
            ctx.stroke();
        }

        function mochiBody(cx, py, isSlide) {
            const bw = isSlide ? 34 : 24;
            const bh = isSlide ? 15 : 24;
            const by = py - 13;
            // Back plate — white armor
            ctx.fillStyle = "#dcdcea";
            ctx.strokeStyle = "#8888a8";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(cx - bw / 2, by - bh, bw, bh, 5);
            ctx.fill();
            ctx.stroke();
            if (!isSlide) {
                // Spine line
                ctx.strokeStyle = "#9090b0";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx, by - bh + 4);
                ctx.lineTo(cx, by - 4);
                ctx.stroke();
                // Horizontal cross panel
                ctx.beginPath();
                ctx.moveTo(cx - bw / 2 + 3, by - bh * 0.52);
                ctx.lineTo(cx + bw / 2 - 3, by - bh * 0.52);
                ctx.stroke();
                // Side armor panels
                ctx.fillStyle = "#9090b0";
                ctx.fillRect(cx - bw / 2, by - bh + 5, 3, bh - 5);
                ctx.fillRect(cx + bw / 2 - 3, by - bh + 5, 3, bh - 5);
                // Back thruster pack (purple glow)
                ctx.fillStyle = "#1e1e2e";
                ctx.beginPath();
                ctx.roundRect(cx - 6, by - bh + 4, 12, 11, 3);
                ctx.fill();
                ctx.shadowColor = "#b44fff";
                ctx.shadowBlur = 8;
                ctx.strokeStyle = "#b44fff";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(cx - 6, by - bh + 4, 12, 11, 3);
                ctx.stroke();
                // Thruster glow dot
                ctx.fillStyle = "#d060ff";
                ctx.beginPath();
                ctx.arc(cx, by - bh + 9.5, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.shadowColor = "transparent";
            }
        }

        function drawMochiEarPair(cx, cy, r) {
            for (const s of [-1, 1]) {
                const bix = cx + s * r * 0.30, biy = cy - r * 0.78; // base inner
                const box = cx + s * r * 0.90, boy = cy - r * 0.52; // base outer
                const tx = cx + s * r * 0.76, ty = cy - r * 1.85; // tip
                // Gradient: dark base → bright pink tip
                const g = ctx.createLinearGradient(cx + s * r * 0.5, cy - r * 0.65, tx, ty);
                g.addColorStop(0, "#6a1596");
                g.addColorStop(0.55, "#9930c8");
                g.addColorStop(1, "#cc44ee");
                ctx.fillStyle = g;
                // Far edge curves outward; near edge sharper
                ctx.beginPath();
                ctx.moveTo(bix, biy);
                ctx.quadraticCurveTo(cx + s * r * 1.22, cy - r * 1.10, tx, ty);
                ctx.quadraticCurveTo(cx + s * r * 0.48, cy - r * 1.55, box, boy);
                ctx.closePath();
                ctx.fill();
                // Inner ear highlight
                ctx.fillStyle = "#de76f8";
                ctx.beginPath();
                ctx.moveTo(cx + s * r * 0.43, biy + r * 0.06);
                ctx.quadraticCurveTo(cx + s * r * 1.06, cy - r * 1.10, cx + s * r * 0.72, ty + r * 0.24);
                ctx.quadraticCurveTo(cx + s * r * 0.54, cy - r * 1.50, cx + s * r * 0.78, boy + r * 0.10);
                ctx.closePath();
                ctx.fill();
                // Mechanical joint at ear base
                ctx.fillStyle = "#8a8aaa";
                ctx.beginPath();
                ctx.arc(cx + s * r * 0.58, cy - r * 0.64, r * 0.17, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#3a3a52";
                ctx.beginPath();
                ctx.arc(cx + s * r * 0.58, cy - r * 0.64, r * 0.08, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function mochiHead(cx, cy, r, isSlide) {
            // Ears drawn first so the ring overlaps their base
            if (!isSlide) drawMochiEarPair(cx, cy, r);
            // Thick proportional armor ring
            ctx.fillStyle = "#8a8aaa";
            ctx.beginPath();
            ctx.arc(cx, cy, r * 1.28, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#aaaacc";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(cx, cy, r * 1.28, 0, Math.PI * 2);
            ctx.stroke();
            // Back of helmet — dark metallic gradient
            const hback = ctx.createRadialGradient(cx, cy - r * 0.3, r * 0.05, cx, cy, r);
            hback.addColorStop(0, "#2e2e46");
            hback.addColorStop(1, "#0d0d1a");
            ctx.fillStyle = hback;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            if (!isSlide) {
                // Back panel detail
                ctx.fillStyle = "#1a1a2e";
                ctx.beginPath();
                ctx.roundRect(cx - r * 0.32, cy - r * 0.42, r * 0.64, r * 0.52, 3);
                ctx.fill();
                // Purple neon horizontal strip on back
                ctx.shadowColor = "#b44fff";
                ctx.shadowBlur = 8;
                ctx.strokeStyle = "#b44fff";
                ctx.lineWidth = 2;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(cx - r * 0.26, cy - r * 0.22);
                ctx.lineTo(cx + r * 0.26, cy - r * 0.22);
                ctx.stroke();
                ctx.shadowBlur = 0;
                // Cyan neck collar at bottom
                ctx.shadowColor = "#00e5ff";
                ctx.shadowBlur = 7;
                ctx.strokeStyle = "rgba(0,220,255,0.75)";
                ctx.lineWidth = 2.2;
                ctx.beginPath();
                ctx.arc(cx, cy + r * 0.65, r * 0.44, Math.PI * 0.08, Math.PI * 0.92);
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else {
                // Side neon strips when sliding
                ctx.shadowColor = "#b44fff";
                ctx.shadowBlur = 6;
                ctx.strokeStyle = "#b44fff";
                ctx.lineWidth = 1.5;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(cx - r * 0.7, cy);
                ctx.lineTo(cx + r * 0.7, cy);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            ctx.shadowColor = "transparent";
        }

        function mochiCannonArm(cx, cy, angle) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            // Upper arm
            ctx.fillStyle = "#363648";
            ctx.strokeStyle = "#50506a";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(-6, -4, 12, 16, 4);
            ctx.fill();
            ctx.stroke();
            // Cannon housing
            ctx.fillStyle = "#22222e";
            ctx.strokeStyle = "#404058";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 16, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            // Blue glow dots
            ctx.shadowColor = "#00aaff";
            ctx.shadowBlur = 7;
            ctx.fillStyle = "#0099ee";
            for (let i = 0; i < 3; i++) {
                const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
                ctx.beginPath();
                ctx.arc(Math.cos(a) * 5.5, 16 + Math.sin(a) * 5.5, 2.2, 0, Math.PI * 2);
                ctx.fill();
            }
            // Center dot
            ctx.fillStyle = "#00ddff";
            ctx.beginPath();
            ctx.arc(0, 16, 2.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function mochiRightArm(cx, cy, angle) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            ctx.fillStyle = "#363648";
            ctx.strokeStyle = "#50506a";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(-5, -4, 10, 14, 3);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "#22222e";
            ctx.beginPath();
            ctx.arc(0, 14, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#0099ee";
            ctx.shadowColor = "#00aaff";
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(0, 14, 2.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function mochiTail(cx, cy) {
            // From back view tail is prominent — curves up and outward
            ctx.save();
            // Dark outer stroke
            ctx.strokeStyle = "#0a0a10";
            ctx.lineWidth = 5;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.bezierCurveTo(cx + 6, cy - 18, cx + 22, cy - 8, cx + 24, cy - 26);
            ctx.stroke();
            // Lighter inner stroke
            ctx.strokeStyle = "#2a2a2a";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.bezierCurveTo(cx + 6, cy - 18, cx + 22, cy - 8, cx + 24, cy - 26);
            ctx.stroke();
            // Tip glow
            ctx.shadowColor = "#b44fff";
            ctx.shadowBlur = 5;
            ctx.fillStyle = "#2a2a2a";
            ctx.beginPath();
            ctx.arc(cx + 24, cy - 26, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // ─── Draw Player ──────────────────────────────────────────────
        function drawPlayer() {
            const px = player.x;
            const py = PLAYER_Y_BASE + player.jumpY;
            const isSlide = player.sliding;
            const isJump = player.jumping;
            const runF = player.runFrame;

            // Ground shadow with color tint
            ctx.save();
            ctx.globalAlpha = Math.max(0, 0.3 - Math.abs(player.jumpY) / 500);
            const shadowGrad = ctx.createRadialGradient(px, PLAYER_Y_BASE + 5, 0, px, PLAYER_Y_BASE + 5, 28);
            shadowGrad.addColorStop(0, 'rgba(0,180,255,0.2)');
            shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = shadowGrad;
            ctx.beginPath();
            ctx.ellipse(px, PLAYER_Y_BASE + 5, 30, 9, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Subtle neon underglow on character while moving
            if (gameState === 'playing') {
                ctx.save();
                ctx.globalAlpha = 0.15;
                const underGlow = ctx.createRadialGradient(px, py - 10, 0, px, py - 10, 45);
                underGlow.addColorStop(0, '#00e5ff');
                underGlow.addColorStop(1, 'rgba(0,229,255,0)');
                ctx.fillStyle = underGlow;
                ctx.fillRect(px - 50, py - 55, 100, 70);
                ctx.restore();
            }

            // Back-facing: cannon arm (char's LEFT) = screen RIGHT, right arm = screen LEFT
            if (isSlide) {
                mochiBoard(px, py, 1.4);
                mochiBody(px - 4, py, true);
                mochiTail(px + 14, py - 14);
                mochiHead(px - 6, py - 20, 11, true);
            } else if (isJump) {
                mochiBoard(px, py, 1.0);
                mochiRightArm(px - 15, py - 25, -0.3);
                mochiBody(px, py, false);
                mochiTail(px + 16, py - 20);
                mochiCannonArm(px + 15, py - 25, 0.3);
                mochiHead(px, py - 50, 13, false);
            } else {
                const bob = [0, -1.5, 0, 1.5][runF];
                mochiBoard(px, py, 1.0);
                mochiRightArm(px - 15, py - 25 + bob, 0);
                mochiBody(px, py + bob, false);
                mochiTail(px + 16, py - 20 + bob);
                mochiCannonArm(px + 15, py - 25 + bob, 0);
                mochiHead(px, py - 50 + bob, 13, false);
            }
        }


        // ─── Obstacles ────────────────────────────────────────────────
        // depth: 0 = at horizon, PLAYER_DEPTH = at player's feet, ~1 = bottom
        const PLAYER_DEPTH = Math.sqrt((PLAYER_Y_BASE - HORIZON_Y) / (GROUND_Y - HORIZON_Y));

        let obstacles = [];
        let obstacleTimer = -2000;          // pre-delay: first obstacle after 2s
        const OBSTACLE_INTERVAL = 2200;     // ms between spawns
        let gameOver = false;
        let gameState = 'start';   // 'start' | 'playing' | 'gameover'

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const type = Math.random() < 0.45 ? 'low_bar' : 'barrier';
            obstacles.push({ lane, type, depth: 0.0 });
        }

        function obstacleScreenPos(obs) {
            const pFrac = obs.depth * obs.depth;
            const y = HORIZON_Y + (GROUND_Y - HORIZON_Y) * pFrac;
            const laneFracs = [1 / 6, 3 / 6, 5 / 6];
            const x = trackX(laneFracs[obs.lane], y);
            const trackW = trackX(1, y) - trackX(0, y);
            const w = (trackW / 3) * 0.75;
            return { x, y, w };
        }

        function updateObstacles(dt) {
            const sec = dt / 1000;
            obstacleTimer += dt;
            if (obstacleTimer >= OBSTACLE_INTERVAL) {
                obstacleTimer -= OBSTACLE_INTERVAL;
                spawnObstacle();
            }
            for (const obs of obstacles) {
                obs.depth += gameSpeed * sec;
            }
            obstacles = obstacles.filter(obs => obs.depth < 1.05);
        }

        // ─── Coins ────────────────────────────────────────────────────
        let coins = [];
        let coinCount = 0;
        let coinTimer = -800;             // slight delay before first coin
        const COIN_INTERVAL = 900;        // ms between coin spawns
        const COIN_COLLECT_DEPTH = 0.06;  // tolerance for collection

        // Coins spawn in a line of 3 in the same lane, one after another
        let coinSequence = [];            // queued coin depths for current line

        function spawnCoinLine() {
            const lane = Math.floor(Math.random() * 3);
            // 4 coins in a row, staggered depths
            for (let i = 0; i < 4; i++) {
                coins.push({ lane, depth: -(i * 0.07), collected: false });
            }
        }

        function coinScreenPos(coin) {
            const pFrac = coin.depth * coin.depth;
            const y = HORIZON_Y + (GROUND_Y - HORIZON_Y) * pFrac;
            const laneFracs = [1 / 6, 3 / 6, 5 / 6];
            const x = trackX(laneFracs[coin.lane], y);
            const trackW = trackX(1, y) - trackX(0, y);
            const r = (trackW / 3) * 0.15;  // coin radius scales with perspective
            return { x, y, r };
        }

        function updateCoins(dt) {
            const sec = dt / 1000;
            coinTimer += dt;
            if (coinTimer >= COIN_INTERVAL) {
                coinTimer -= COIN_INTERVAL;
                spawnCoinLine();
            }
            for (const coin of coins) {
                coin.depth += gameSpeed * sec;
            }
            // Collect coins
            for (const coin of coins) {
                if (coin.collected) continue;
                if (coin.depth < PLAYER_DEPTH - COIN_COLLECT_DEPTH) continue;
                if (coin.depth > PLAYER_DEPTH + COIN_COLLECT_DEPTH) continue;
                if (coin.lane !== player.targetLane) continue;
                coin.collected = true;
                coinCount++;
                score += 7; // coin bonus
                const cpos = coinScreenPos(coin);
                spawnCoinPop(cpos.x, cpos.y);
            }
            coins = coins.filter(c => c.depth < 1.1 && !c.collected);
        }

        function drawCoins() {
            for (const coin of coins) {
                if (coin.depth < 0) continue;
                const { x, y, r } = coinScreenPos(coin);
                if (r < 2) continue;

                // Outer glow ring — cyan/purple
                const glow = ctx.createRadialGradient(x, y, 0, x, y, r * 2.4);
                glow.addColorStop(0, "rgba(0,220,255,0.25)");
                glow.addColorStop(0.5, "rgba(160,60,255,0.15)");
                glow.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, r * 2.4, 0, Math.PI * 2);
                ctx.fill();

                // Holographic coin body
                const spin = (Date.now() * 0.002 + coin.depth * 6) % (Math.PI * 2);
                const squish = Math.abs(Math.cos(spin)) * 0.6 + 0.4; // 0.4–1.0
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(squish, 1);
                const grad = ctx.createLinearGradient(-r, 0, r, 0);
                grad.addColorStop(0, "#b44fff");
                grad.addColorStop(0.4, "#00e5ff");
                grad.addColorStop(0.7, "#ff2d78");
                grad.addColorStop(1, "#b44fff");
                ctx.shadowColor = "#00e5ff";
                ctx.shadowBlur = 8;
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.fill();
                // Inner highlight
                ctx.fillStyle = "rgba(255,255,255,0.35)";
                ctx.beginPath();
                ctx.ellipse(-r * 0.15, -r * 0.2, r * 0.38, r * 0.22, -0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }

        function checkCollisions() {
            const TOLERANCE = 0.07;
            for (const obs of obstacles) {
                if (Math.abs(obs.depth - PLAYER_DEPTH) > TOLERANCE) continue;
                if (obs.lane !== player.targetLane) continue;
                if (obs.type === 'barrier' && player.jumping) continue;
                if (obs.type === 'low_bar' && player.sliding) continue;
                if (score > highScore) highScore = Math.floor(score);
                gameOver = true;
                gameState = 'gameover';
                triggerShake(18);
                if (typeof window.mochiOnGameOver === 'function') window.mochiOnGameOver(Math.floor(score));
                break;
            }
        }

        // ─── HUD ──────────────────────────────────────────────────────
        function drawHUD() {

            ctx.fillRect(0, 0, W, 54);

            ctx.shadowColor = "#b44fff"; ctx.shadowBlur = 8;

            ctx.beginPath(); ctx.moveTo(0, 54); ctx.lineTo(W, 54); ctx.stroke();
            ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

            // ─ SCORE + COINS grouped on the right side ─────────────────────

            // SCORE column
            ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 6;
            ctx.fillStyle = "#00e5ff";

            // Thin vertical divider
