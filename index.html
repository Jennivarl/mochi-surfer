            ctx.beginPath(); ctx.moveTo(W - 80, 10); ctx.lineTo(W - 80, 44); ctx.stroke();

            // Coin dot
            ctx.fillStyle = "#f4c010";
            ctx.shadowColor = "#f4c010"; ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(W - 67, 16, 5, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

            // COINS column
            ctx.fillStyle = "#f4c010";
            ctx.font = "bold 9px 'Orbitron', Arial";
            ctx.textAlign = "right";
            ctx.fillText("COINS", W - 14, 17);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 20px 'Orbitron', Arial";
            ctx.fillText(coinCount, W - 14, 38);

            // Countdown timer — center (tournament only)
            if (window.sessionCode) {
                const mins = Math.floor(sessionTimeLeft / 60);
                const secs = String(Math.floor(sessionTimeLeft % 60)).padStart(2, '0');
                const timeStr = mins + ':' + secs;
                const timerColor = sessionTimeLeft <= 30 ? '#ff2d78' : sessionTimeLeft <= 60 ? '#f4c010' : 'rgba(255,255,255,0.65)';
                if (sessionTimeLeft <= 30) { ctx.shadowColor = '#ff2d78'; ctx.shadowBlur = 12; }
                ctx.fillStyle = timerColor;

            }

            // Speed bar with gradient fill
            const speedFrac = (gameSpeed - 0.4) / (MAX_SPEED - 0.4);
            ctx.fillStyle = "rgba(255,255,255,0.06)";
            ctx.beginPath(); ctx.roundRect(14, 46, W - 28, 4, 2); ctx.fill();
            const barColor = speedFrac < 0.5 ? "#00e5ff" : speedFrac < 0.8 ? "#b44fff" : "#ff2d78";
            ctx.shadowColor = barColor; ctx.shadowBlur = 6;
            ctx.fillStyle = barColor;
            ctx.beginPath(); ctx.roundRect(14, 46, (W - 28) * speedFrac, 4, 2); ctx.fill();
            ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
        }

        function drawObstacles() {
            for (const obs of obstacles) {
                const { x, y, w } = obstacleScreenPos(obs);
                const scale = w / 40; // used to scale details

                if (obs.type === 'barrier') {
                    // ── Subway train door / wall ── (shorter = clear to jump over)
                    const h = w * 0.85;
                    const lx = x - w / 2, ty = y - h;

                    // Main body — dark steel
                    ctx.fillStyle = "#1a1a2a";
                    ctx.beginPath();
                    ctx.roundRect(lx, ty, w, h, 3 * scale);
                    ctx.fill();

                    // Outer frame — bright cyan neon border
                    ctx.shadowColor = "#00e5ff";
                    ctx.shadowBlur = 10 * scale;
                    ctx.strokeStyle = "#00e5ff";
                    ctx.lineWidth = 2 * scale;
                    ctx.beginPath();
                    ctx.roundRect(lx, ty, w, h, 3 * scale);
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    // Yellow/black hazard stripes at bottom
                    const stripeH = h * 0.18;
                    const stripeCount = Math.max(3, Math.round(w / 8));
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(lx, y - stripeH, w, stripeH);
                    ctx.clip();
                    for (let s = 0; s < stripeCount * 2; s++) {
                        ctx.fillStyle = s % 2 === 0 ? "#ffd700" : "#111";
                        ctx.beginPath();
                        ctx.moveTo(lx + (s / (stripeCount * 2)) * w * 1.4 - stripeH, y - stripeH);
                        ctx.lineTo(lx + (s / (stripeCount * 2)) * w * 1.4, y);
                        ctx.lineTo(lx + ((s + 1) / (stripeCount * 2)) * w * 1.4, y);
                        ctx.lineTo(lx + ((s + 1) / (stripeCount * 2)) * w * 1.4 - stripeH, y - stripeH);
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.restore();

                    // Door gap line down the center
                    ctx.strokeStyle = "rgba(0,220,255,0.4)";
                    ctx.lineWidth = 1.5 * scale;
                    ctx.beginPath();
                    ctx.moveTo(x, ty + h * 0.05);
                    ctx.lineTo(x, y - stripeH);
                    ctx.stroke();

                    // Two red warning lights on top corners
                    for (const lx2 of [lx + w * 0.18, lx + w * 0.82]) {
                        ctx.shadowColor = "#ff2020";
                        ctx.shadowBlur = 8 * scale;
                        ctx.fillStyle = "#ff3030";
                        ctx.beginPath();
                        ctx.arc(lx2, ty + 5 * scale, 3.5 * scale, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = "transparent";

                } else {
                    // ── Electric neon barrier ── (taller posts = clearly need to slide under)
                    const postH = w * 1.65;
                    const postW = w * 0.14;
                    const barY = y - postH * 0.55;
                    const barThick = w * 0.18;

                    // Posts — dark metal
                    ctx.fillStyle = "#252535";
                    ctx.strokeStyle = "#b44fff";
                    ctx.lineWidth = 1.5 * scale;
                    for (const px2 of [x - w / 2, x + w / 2 - postW]) {
                        ctx.beginPath();
                        ctx.roundRect(px2, y - postH, postW, postH, 2);
                        ctx.fill();
                        ctx.stroke();
                    }

                    // Post top caps — purple glow orbs
                    ctx.shadowColor = "#c850ff";
                    ctx.shadowBlur = 12 * scale;
                    ctx.fillStyle = "#d060ff";
                    for (const px2 of [x - w / 2 + postW / 2, x + w / 2 - postW / 2]) {
                        ctx.beginPath();
                        ctx.arc(px2, y - postH, postW * 0.9, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;

                    // Energy bar — animated flicker using elapsed time
                    const flicker = 0.75 + Math.sin(Date.now() * 0.018) * 0.25;
                    const barGrad = ctx.createLinearGradient(x - w / 2, 0, x + w / 2, 0);
                    barGrad.addColorStop(0, `rgba(180,80,255,${(0.6 * flicker).toFixed(2)})`);
                    barGrad.addColorStop(0.5, `rgba(255,255,255,${(0.95 * flicker).toFixed(2)})`);
                    barGrad.addColorStop(1, `rgba(180,80,255,${(0.6 * flicker).toFixed(2)})`);
                    ctx.shadowColor = "#c850ff";
                    ctx.shadowBlur = 14 * scale * flicker;
                    ctx.fillStyle = barGrad;
                    ctx.beginPath();
                    ctx.roundRect(x - w / 2, barY - barThick / 2, w, barThick, barThick / 2);
                    ctx.fill();

                    // Spark lines on the bar
                    ctx.strokeStyle = `rgba(255,255,255,${(0.7 * flicker).toFixed(2)})`;
                    ctx.lineWidth = 1 * scale;
                    ctx.lineCap = "round";
                    for (let i = 0; i < 3; i++) {
                        const sx = x - w * 0.3 + i * w * 0.3;
                        const jit = (Math.sin(Date.now() * 0.03 + i * 2.1) * barThick * 0.4);
                        ctx.beginPath();
                        ctx.moveTo(sx - 3, barY + jit);
                        ctx.lineTo(sx, barY - jit * 0.5);
                        ctx.lineTo(sx + 3, barY + jit);
                        ctx.stroke();
                    }
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = "transparent";
                }
            }
        }

        // ─── Draw ─────────────────────────────────────────────────────
        // Button hit-test helper
        const restartBtn = { x: W / 2 - 100, y: 0, w: 200, h: 52 }; // y set in draw
        const dismissBtn = { x: W / 2 - 100, y: 0, w: 200, h: 44 };  // "Back to Menu" on game-over
        const closeBtn = { x: W / 2 - 14, y: 0, w: 28, h: 28 };    // ✕ corner close
        const startBtn = { x: W / 2 - 110, y: 0, w: 220, h: 52 };
        let startCountdown = 0;      // >0 while counting down 3…2…1
        let startCountdownId = null; // setInterval handle

        function drawRoundedRect(x, y, w, h, r, fill, stroke) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            if (fill) { ctx.fillStyle = fill; ctx.fill(); }
            if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
        }

        // ─── Mochi Front-Facing (for Game Over screen) ───────────────
        function drawMochiFront(cx, cy, r) {
            // Energy aura glow behind character
            const auraGrad = ctx.createRadialGradient(cx, cy + r * 0.5, r * 0.5, cx, cy + r * 0.5, r * 3.5);
            auraGrad.addColorStop(0, 'rgba(0,229,255,0.12)');
            auraGrad.addColorStop(0.4, 'rgba(180,79,255,0.06)');
            auraGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = auraGrad;
            ctx.fillRect(cx - r * 4, cy - r * 3, r * 8, r * 7);

            // Ears drawn first — ring will overlap their base for clean attachment
            drawMochiEarPair(cx, cy, r);

            // Thick proportional armor ring
            ctx.fillStyle = "#8a8aaa";
            ctx.beginPath();
            ctx.arc(cx, cy, r * 1.28, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#aaaacc";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(cx, cy, r * 1.28, 0, Math.PI * 2);
            ctx.stroke();

            // Visor — deep dark navy (perfect circle)
            ctx.fillStyle = "#0d1622";
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();

            // Visor dome shine
            ctx.fillStyle = "rgba(60,120,220,0.12)";
            ctx.beginPath();
            ctx.ellipse(cx - r * 0.18, cy - r * 0.28, r * 0.55, r * 0.42, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Wide "A" logo triangle
            ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 14;
            ctx.fillStyle = "#00ccee";
            ctx.beginPath();
            ctx.moveTo(cx, cy - r * 0.58);
            ctx.lineTo(cx - r * 0.42, cy - r * 0.10);
            ctx.lineTo(cx + r * 0.42, cy - r * 0.10);
            ctx.closePath(); ctx.fill();
            // Inner cutout makes it read as "A"
            ctx.fillStyle = "#0d1622"; ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(cx, cy - r * 0.49);
            ctx.lineTo(cx - r * 0.12, cy - r * 0.30);
            ctx.lineTo(cx + r * 0.12, cy - r * 0.30);
            ctx.closePath(); ctx.fill();

            // Large blade/lens eyes
            ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 18;
            ctx.fillStyle = "#00e5ff";
            ctx.save();
            ctx.translate(cx - r * 0.35, cy - r * 0.06);
            ctx.rotate(0.32);
            ctx.beginPath();
            ctx.moveTo(-r * 0.45, 0);
            ctx.quadraticCurveTo(-r * 0.08, -r * 0.25, r * 0.45, 0);
            ctx.quadraticCurveTo(-r * 0.08, r * 0.20, -r * 0.45, 0);
            ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.save();
            ctx.translate(cx + r * 0.35, cy - r * 0.06);
            ctx.rotate(-0.32);
            ctx.beginPath();
            ctx.moveTo(-r * 0.45, 0);
            ctx.quadraticCurveTo(-r * 0.08, -r * 0.25, r * 0.45, 0);
            ctx.quadraticCurveTo(-r * 0.08, r * 0.20, -r * 0.45, 0);
            ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.shadowBlur = 0;

            // Wide smirk
            ctx.strokeStyle = "#00ddf0";
            ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 8;
            ctx.lineWidth = r * 0.13;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.arc(cx, cy + r * 0.46, r * 0.30, 0.14, Math.PI - 0.14);
            ctx.stroke();
            ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

            // Body below head
            const bw = r * 1.6, bh = r * 1.6;
            const bx = cx - bw / 2, bby = cy + r * 1.28 + 3;
            ctx.fillStyle = "#dcdcea";
            ctx.strokeStyle = "#8888a8"; ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(bx, bby, bw, bh, 5); ctx.fill(); ctx.stroke();
            // Chest logo
            const lx = cx, ly = bby + bh * 0.42;
            ctx.fillStyle = "#8b30b8";
            ctx.beginPath();
            ctx.moveTo(lx, ly - r * 0.52);
            ctx.lineTo(lx - r * 0.38, ly + r * 0.24);
            ctx.lineTo(lx + r * 0.38, ly + r * 0.24);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = "#c265e0";
            ctx.beginPath();
            ctx.moveTo(lx, ly - r * 0.26);
            ctx.lineTo(lx - r * 0.19, ly + r * 0.12);
            ctx.lineTo(lx + r * 0.19, ly + r * 0.12);
            ctx.closePath(); ctx.fill();
            // Cannon arm (left side on front view)
            ctx.fillStyle = "#363648";
            ctx.strokeStyle = "#50506a"; ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.roundRect(bx - r * 0.72, bby + 4, r * 0.55, r, 4);
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#22222e";
            ctx.strokeStyle = "#404058"; ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(bx - r * 0.46, bby + 4 + r, r * 0.55, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            ctx.shadowColor = "#00aaff"; ctx.shadowBlur = 8;
            ctx.fillStyle = "#0099ee";
            for (let i = 0; i < 3; i++) {
                const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
                ctx.beginPath();
                ctx.arc(bx - r * 0.46 + Math.cos(a) * r * 0.3,
                    bby + 4 + r + Math.sin(a) * r * 0.3, r * 0.13, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = "#00ddff";
            ctx.beginPath();
            ctx.arc(bx - r * 0.46, bby + 4 + r, r * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            // Right arm
            ctx.fillStyle = "#363648";
            ctx.strokeStyle = "#50506a"; ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.roundRect(bx + bw + r * 0.18, bby + 4, r * 0.5, r * 0.85, 4);
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#22222e";
            ctx.beginPath();
            ctx.arc(bx + bw + r * 0.43, bby + 4 + r * 0.85, r * 0.32, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowColor = "#00aaff"; ctx.shadowBlur = 6;
            ctx.fillStyle = "#0099ee";
            ctx.beginPath();
            ctx.arc(bx + bw + r * 0.43, bby + 4 + r * 0.85, r * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; ctx.shadowColor = "transparent";
        }

        function drawGameOverScreen() {
            // Dark vignette overlay with radial gradient
            const vigGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, H * 0.7);
            vigGrad.addColorStop(0, 'rgba(10,0,30,0.72)');
            vigGrad.addColorStop(1, 'rgba(0,0,0,0.92)');
            ctx.fillStyle = vigGrad;
            ctx.fillRect(0, 0, W, H);

            const cx = W / 2, cy = H / 2 + 20;
            const cardX = cx - 165, cardY = cy - 215, cardW = 330, cardH = 410, cardR = 22;

            // Card background with inner gradient
            const cardGrad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
            cardGrad.addColorStop(0, '#0e0525');
            cardGrad.addColorStop(0.5, '#08031a');
            cardGrad.addColorStop(1, '#050210');
            drawRoundedRect(cardX, cardY, cardW, cardH, cardR, cardGrad, null);

            // Double border: outer purple glow + inner cyan accent
            ctx.shadowColor = '#b44fff'; ctx.shadowBlur = 28;
            ctx.strokeStyle = '#b44fff'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, cardR); ctx.stroke();
            ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
            ctx.strokeStyle = 'rgba(0,220,255,0.15)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(cardX + 4, cardY + 4, cardW - 8, cardH - 8, cardR - 2); ctx.stroke();

            // Corner energy accents
            ctx.strokeStyle = 'rgba(0,229,255,0.5)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
            [[cardX + 8, cardY + 28, cardX + 8, cardY + 8, cardX + 28, cardY + 8],
            [cardX + cardW - 8, cardY + 28, cardX + cardW - 8, cardY + 8, cardX + cardW - 28, cardY + 8],
            [cardX + 8, cardY + cardH - 28, cardX + 8, cardY + cardH - 8, cardX + 28, cardY + cardH - 8],
            [cardX + cardW - 8, cardY + cardH - 28, cardX + cardW - 8, cardY + cardH - 8, cardX + cardW - 28, cardY + cardH - 8]
            ].forEach(([x1, y1, x2, y2, x3, y3]) => {
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.stroke();
            });

            // Cover image / Mochi avatar
            if (window._coverImg && window._coverImg.complete && window._coverImg.naturalWidth > 0) {
                var imgS = 120, imgX = cx - imgS / 2, imgY = cy - 208;
                ctx.save();
                ctx.shadowColor = '#b44fff'; ctx.shadowBlur = 18;
                ctx.beginPath(); ctx.roundRect(imgX, imgY, imgS, imgS, 16); ctx.clip();
                ctx.drawImage(window._coverImg, imgX, imgY, imgS, imgS);
                ctx.restore();
                ctx.strokeStyle = 'rgba(180,80,255,0.45)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.roundRect(imgX, imgY, imgS, imgS, 16); ctx.stroke();
                ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
            } else {
                drawMochiFront(cx, cy - 148, 26);
            }

            // GAME OVER title — hot pink with double glow
            ctx.shadowColor = '#ff2d78'; ctx.shadowBlur = 32;
            ctx.fillStyle = '#ff2d78';
            ctx.font = "bold 38px 'Orbitron', Arial";
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', cx, cy - 42);
            ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

            // Gradient divider line

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Apply screen shake
            const { sx, sy } = getShakeOffset();
            if (sx !== 0 || sy !== 0) {
                ctx.save();
                ctx.translate(sx, sy);
            }

            drawTrack();
            drawTrail();
            drawCoins();
            drawObstacles();
            drawPlayer();
            drawParticles();

            if (sx !== 0 || sy !== 0) ctx.restore();

            drawHUD();
            drawBanner();
            if (gameState === 'start') drawStartScreen();
            if (gameState === 'gameover') drawGameOverScreen();
        }

        // ─── Reset ────────────────────────────────────────────────────
        function resetGame() {
            score = 0;
            coinCount = 0;
            elapsedTime = 0;
            gameSpeed = 0.4;
            scrollOffset = 0;
            cityScrollFar = 0;
            cityScrollNear = 0;
            obstacles = [];
            coins = [];
            particles = [];
            banner = null;
            trail = [];
            lastMilestone = 0;
            window._speed50shown = false;
            obstacleTimer = -2000;
            coinTimer = -800;
            gameOver = false;
            gameState = 'playing';
            // In tournament mode, timer persists across deaths (don't reset)
            if (!window.sessionCode) {
                sessionTimeLeft = getSessionDuration();
            }
            if (typeof window.mochiOnRestart === 'function') window.mochiOnRestart();

            player.lane = 1;
            player.targetLane = 1;
            player.laneX = laneXAt(1, PLAYER_Y_BASE);
            player.targetX = player.laneX;
            player.x = player.laneX;
            player.jumping = false;
            player.jumpVY = 0;
            player.jumpY = 0;
            player.sliding = false;
            player.slideTimer = 0;
            player.runFrame = 0;
            player.runTimer = 0;
        }

        // ─── Click / Tap handler ────────────────────────────────────
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const scaleY = H / rect.height;
            const touch = e.changedTouches ? e.changedTouches[0] : null;
            const clientX = touch ? touch.clientX : e.clientX;
            const clientY = touch ? touch.clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function isInsideBtn(pos, btn) {
            return pos.x >= btn.x && pos.x <= btn.x + btn.w &&
                pos.y >= btn.y && pos.y <= btn.y + btn.h;
        }

        function handleTap(e) {
            e.preventDefault();
            const pos = getCanvasPos(e);
            if (gameState === 'gameover') {
                // ✕ close button (top-right) — dismiss to 'start' menu
                if (isInsideBtn(pos, closeBtn)) { dismissGameOver(); return; }
                // ← Back to Menu
                if (isInsideBtn(pos, dismissBtn)) { dismissGameOver(); return; }
                // ↺ Restart (blocked in tournament — must wait for timer)
                if (isInsideBtn(pos, restartBtn) && !window.sessionCode) { beginStartCountdown(); return; }
                return;
            }
            if (gameState === 'start') {
                if (window._lobbyActive) return; // can't start during lobby countdown
                if (window._tournamentRunDone) return; // tournament run already done, can't restart
                if (startCountdown > 0) return; // already counting, ignore extra taps
                beginStartCountdown();
                return;
            }
        }

        function dismissGameOver() {
            // Return to start screen without resetting score display — profile chip stays
            gameState = 'start';
            startCountdown = 0;
            clearInterval(startCountdownId);
            startCountdownId = null;
            // Show gl-panel (score panel) behind the start screen — user can see leaderboard btn
            // but hide gl-panel so screen is clean; mochiOnGameOver already showed it
            // Keep it open so user can click View Leaderboard if they want
        }

        function beginStartCountdown() {
            if (startCountdown > 0) return;
            startCountdown = 3;
            clearInterval(startCountdownId);
            startCountdownId = setInterval(() => {
                startCountdown--;
                if (startCountdown <= 0) {
                    clearInterval(startCountdownId);
                    startCountdownId = null;
                    startCountdown = 0;
                    resetGame();
                }
            }, 1000);
        }

        canvas.addEventListener('click', handleTap);
        // touch handled by unified touchstart/move/end above

        // ─── Main Game Loop ───────────────────────────────────────────
        function gameLoop(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            // Tournament timer ticks down even during game-over (so it expires while player is dead)
            if (window.sessionCode && gameState === 'gameover' && !window._tournamentRunDone) {
                const sec = dt / 1000;
                sessionTimeLeft -= sec;
                if (sessionTimeLeft <= 0) {
                    sessionTimeLeft = 0;
                    window._tournamentRunDone = true;
                    // Auto-show leaderboard now that timer expired
                    const boardBtn = document.getElementById('gl-board-btn');
                    if (boardBtn) boardBtn.style.display = '';
                    setTimeout(openLeaderboard, 500);
                }
            }

            update(dt);
            draw();

            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ─── Start ────────────────────────────────────────────────────
        function startGame() {
            // Init player visual position for the start screen preview
            player.laneX = laneXAt(1, PLAYER_Y_BASE);
            player.targetX = player.laneX;
            player.x = player.laneX;
            gameState = 'start';
            lastTime = performance.now();
            animFrameId = requestAnimationFrame(gameLoop);
        }

    <script>
        // ─── EIP-6963: set up as early as possible so no wallet announcement is missed.
        // Extensions fire eip6963:announceProvider in response to eip6963:requestProvider.
        // The module script loads late (async), so we capture providers here instead.
        window.__eip6963Providers = [];
        window.addEventListener('eip6963:announceProvider', function (event) {
            var info = event.detail && event.detail.info;
            var provider = event.detail && event.detail.provider;
            if (!info || !provider) return;
            var already = window.__eip6963Providers.some(function (p) { return p.info.rdns === info.rdns; });
            if (!already) window.__eip6963Providers.push({ info: info, provider: provider });
        });
        window.dispatchEvent(new Event('eip6963:requestProvider'));

        // Patch window.fetch BEFORE the module script loads so the SDK always
        // hits our interceptor. The SDK routes eth_chainId to the GenLayer RPC
        // (not MetaMask) — the RPC rejects it. We answer locally instead.
        (function () {
            const GL_RPC = 'https://rpc-bradbury.genlayer.com';
            const CHAIN_ID_RESULT = '0x107d'; // 4221
            const _fetch = window.fetch.bind(window);
            window.fetch = async function (input, init) {
                const url = typeof input === 'string' ? input
                    : (input instanceof Request ? input.url : String(input));
                if (url.startsWith(GL_RPC)) {
                    let bodyText = null;
                    if (init?.body && typeof init.body === 'string') {
                        bodyText = init.body;
                    } else if (input instanceof Request) {
                        try { bodyText = await input.clone().text(); } catch (_) { }
                    }
                    if (bodyText) {
                        let parsed;
                        try { parsed = JSON.parse(bodyText); } catch (_) { }
                        const m = parsed?.method;
                        if (m === 'eth_chainId' || m === 'eth_chainID') {
                            return new Response(
                                JSON.stringify({ jsonrpc: '2.0', id: parsed.id ?? 1, result: CHAIN_ID_RESULT }),
                                { status: 200, headers: { 'Content-Type': 'application/json' } }
                            );
                        }
                    }
                }
                return _fetch(input, init);
            };
        })();
    </script>
    <script type="module">
        // ─── GenLayer Leaderboard Integration ──────────────────────────
        import { createClient } from 'https://esm.sh/genlayer-js@0.28.4';
        import { testnetBradbury } from 'https://esm.sh/genlayer-js@0.28.4/chains';

        // ─── Chain constants ───────────────────────────────────────────
        // testnetBradbury chain ID = 4221 = 0x107D
        // testnetBradbury.id = 4221 = 0x107D
        // MUST be uppercase — MetaMask returns '0x107D' and the SDK does strict r !== a comparison inside Le()
        const CHAIN_ID_HEX = '0x' + testnetBradbury.id.toString(16).toUpperCase();
        const CHAIN_RPC = (testnetBradbury.rpcUrls?.default?.http?.[0]) || 'https://rpc-bradbury.genlayer.com';

        // Manual chain switch — bypasses the SDK's connect() / snap install flow.
        // After switching we verify the chain ID matches to confirm the switch took effect.
        async function ensureOnGenLayerChain() {
            const prov = window.activeProvider || window.ethereum;
            const current = await prov.request({ method: 'eth_chainId' });
            if (current.toUpperCase() === CHAIN_ID_HEX.toUpperCase()) return; // already correct
            try {
                await prov.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: CHAIN_ID_HEX }]
                });
            } catch (switchErr) {
                if (switchErr.code === 4902 || switchErr.code === -32603) {
                    await prov.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: CHAIN_ID_HEX,
                            chainName: 'GenLayer Testnet Bradbury',
                            rpcUrls: ['https://rpc-bradbury.genlayer.com'],
                            nativeCurrency: { name: 'GEN', symbol: 'GEN', decimals: 18 },
                            blockExplorerUrls: ['https://explorer-bradbury.genlayer.com']
                        }]
                    });
                } else {
                    throw switchErr;
                }
            }
            // Verify switch took effect
            const after = await prov.request({ method: 'eth_chainId' });
            if (after.toUpperCase() !== CHAIN_ID_HEX.toUpperCase()) {
                throw new Error('Network switch failed — wallet is still on chain ' + after + '. Please switch to GenLayer Testnet Bradbury manually.');
            }
        }

        const CONTRACT = '0x6Ec313A838bc657b4d928B56cd91C82C718613F1';
        const MAX_NAME_GLOBAL = 20;
        const MAX_NAME_SESSION = 13; // 20 - 7 chars reserved for "CODE:" prefix

        // Read-only client for leaderboard reads (no wallet needed)
        const readClient = createClient({ chain: testnetBradbury });

        // ─── Local Best Score (localStorage) ────────────────────────
        function _lbKey(addr) { return 'mochi_best_' + (addr || '').toLowerCase(); }
        function getLocalBest(addr) {
            try {
                const raw = localStorage.getItem(_lbKey(addr));
                if (!raw) return null;
                return JSON.parse(raw); // { name, score }
            } catch { return null; }
        }
        function setLocalBest(addr, name, score) {
            try {
                const cur = getLocalBest(addr);
                if (cur && cur.score >= score) return false; // not a new best
                localStorage.setItem(_lbKey(addr), JSON.stringify({ name, score }));
                return true; // new best!
            } catch { return false; }
        }

        // ─── Session Code State ────────────────────────────────────────
        window.sessionCode = null;  // null = global, "SURF42" = session
        window.guestName = null;    // set when playing without wallet in a tournament

        function applySessionUI() {
            const code = window.sessionCode;
            const badge = document.getElementById('gl-session-badge');
            const nameInput = document.getElementById('gl-name');
            const subtitle = document.getElementById('gl-lb-subtitle');
            if (code) {
                badge.textContent = 'SESSION: ' + code;
                badge.style.display = 'block';
                nameInput.maxLength = MAX_NAME_SESSION;
                nameInput.placeholder = 'Your name (max ' + MAX_NAME_SESSION + ' chars)…';
                if (subtitle) subtitle.textContent = 'Session: ' + code;
            } else {
                badge.style.display = 'none';
                nameInput.maxLength = MAX_NAME_GLOBAL;
                nameInput.placeholder = 'Your name…';
                if (subtitle) subtitle.textContent = 'Global leaderboard';
            }
            // Pre-fill name from guest if set
            if (window.guestName && !nameInput.value) nameInput.value = window.guestName;
        }

        // ─── Session Code Input ────────────────────────────────────────
        const sessionInput = document.getElementById('session-code-input');
        const sessionJoinBtn = document.getElementById('session-join-btn');
        const sessionStatus = document.getElementById('session-status');

        function writeRoomState(code, state) { try { localStorage.setItem(_roomKey(code), JSON.stringify(state)); } catch { } }

        function lsAddPlayer(code, playerName, isCreator) {

            }
            if (!state.players.find(p => p.name === playerName)) {
                const entry = { name: playerName, isCreator: !!isCreator };
                if (isCreator) state.players.unshift(entry); else state.players.push(entry);
            }
            writeRoomState(code, state);
            return state;
        }

        function lsRemovePlayer(code, playerName) {
            const state = readRoomState(code);
            if (!state) return;
            state.players = state.players.filter(p => p.name !== playerName);
            state.players.length === 0 ? removeRoomState(code) : writeRoomState(code, state);
        }

        function lsMarkStarted(code) {

            }
            toast.style.display = 'block';
            clearTimeout(_myScoreTimer);
            _myScoreTimer = setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        async function connectWithProvider(provider, name) {
            walletPickerBackdrop.classList.remove('open');
            walletConnectBtn.disabled = true;
            setOverlayStatus('Connecting to ' + name + '…');
            try {
                const accounts = await provider.request({ method: 'eth_requestAccounts' });
                if (!accounts || accounts.length === 0) throw new Error('No accounts returned');
                window.walletAddr = accounts[0];
                window.activeProvider = provider;
                window._walletName = name;
                window.guestName = null;
                setOverlayStatus('✓ ' + name + ': ' + accounts[0].slice(0, 6) + '…' + accounts[0].slice(-4), '#39ff8e');
                updateHudProfile();
                // Show name input instead of dismissing
                document.getElementById('wallet-name-row').style.display = 'flex';
                document.getElementById('wallet-skip-btn').style.display = 'none';
                document.getElementById('wallet-name-input').focus();
            } catch (err) {
                walletConnectBtn.disabled = false;
                const msg = err?.message || String(err);
                if (msg.toLowerCase().includes('rejected') || msg.toLowerCase().includes('denied') || err?.code === 4001) {
                    setOverlayStatus('Connection rejected — try again or play as guest', '#ff6b6b');
                } else {
                    setOverlayStatus('Error: ' + msg.substring(0, 80), '#ff6b6b');
                }
            }
        }

        walletConnectBtn.addEventListener('click', async () => {
            walletConnectBtn.disabled = true;
            setOverlayStatus('Connecting…');

            // Collect providers: EIP-6963 first, then window.ethereum fallback
            window.dispatchEvent(new Event('eip6963:requestProvider'));
            // Small delay to let EIP-6963 announcements arrive
            await new Promise(r => setTimeout(r, 250));

            const opts = [];
            for (const { info, provider } of window.__eip6963Providers) {
                opts.push({ name: info.name, icon: info.icon, provider });
            }
            if (window.ethereum) {
                const alreadyListed = opts.some(o => o.provider === window.ethereum);
                if (!alreadyListed) {
                    const n = window.ethereum.isMetaMask ? 'MetaMask'
                        : window.ethereum.isCoinbaseWallet ? 'Coinbase Wallet'
                            : window.ethereum.isRabby ? 'Rabby'
                                : window.ethereum.isBraveWallet ? 'Brave Wallet'
                                    : window.ethereum.isOkxWallet ? 'OKX Wallet'
                                        : 'Browser Wallet';
                    opts.push({ name: n, icon: null, provider: window.ethereum });
                }
            }

            if (opts.length === 0) {
                walletConnectBtn.disabled = false;
                setOverlayStatus('No wallet found — install MetaMask or Rabby', '#ff6b6b');
                return;
            }

            if (opts.length === 1) {
                // Only one wallet — connect directly without picker
                await connectWithProvider(opts[0].provider, opts[0].name);
            } else {
                // Multiple wallets — let user pick
                walletConnectBtn.disabled = false;
                setOverlayStatus('');
                buildWalletOptions();
                walletPickerBackdrop.classList.add('open');
            }
        });

        // "Play without wallet" — if session code active, ask for guest name first
        walletSkipBtn.addEventListener('click', () => {
            window.walletAddr = null;
            if (window.sessionCode) {
                // Show the guest name input row
                guestNameRow.style.display = 'flex';
                walletSkipBtn.style.display = 'none';
                document.getElementById('guest-name-input').focus();
            } else {
                dismissWalletOverlay();
            }
        });

        document.getElementById('wallet-name-go-btn').addEventListener('click', () => {
            const raw = document.getElementById('wallet-name-input').value.trim();
            if (raw.length < 1 || raw.length > MAX_NAME_GLOBAL) {
                setOverlayStatus('Name must be 1–' + MAX_NAME_GLOBAL + ' chars', '#ff2d78');
                return;
            }
            window._submittedName = raw;
            document.getElementById('gl-name').value = raw;
            updateHudProfile();
            if (window._pendingLobby && window.sessionCode) {
                startLobby(window.sessionCode);
            } else {
                dismissWalletOverlay();
            }
        });

        document.getElementById('guest-confirm-btn').addEventListener('click', () => {
            const raw = document.getElementById('guest-name-input').value.trim();
            if (raw.length < 1 || raw.length > MAX_NAME_SESSION) {
                sessionStatus.textContent = 'Name must be 1–' + MAX_NAME_SESSION + ' chars';
                sessionStatus.style.color = '#ff2d78';
                return;
            }
            window.guestName = raw;
            updateHudProfile();
            if (window._pendingLobby && window.sessionCode) {
                startLobby(window.sessionCode);
            } else {
                if (window.sessionCode) registerTournamentPlayer(raw);
                dismissWalletOverlay();
            }
        });

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function setStatus(msg, color) {
            const s = document.getElementById('gl-status');
            s.textContent = msg;
            s.style.color = color || 'rgba(180,180,180,0.9)';
        }

        async function loadTopScores() {
            const list = document.getElementById('gl-scores-list');
            const subtitle = document.getElementById('gl-lb-subtitle');
            const code = window.sessionCode;
            list.innerHTML = '<div class="gl-loading">Loading…</div>';
            if (subtitle) subtitle.textContent = code ? 'Tournament: ' + code : 'Global leaderboard';

            // Tournament mode — load scores from Firebase (cross-device), fallback to local
            if (code) {
                let scores = window._tournamentScores || [];
                // Try Firebase first for cross-device scores
                if (_useFirebase()) {
                    try {
                        const fbScores = await fbLoadScores(code);
                        if (fbScores && fbScores.length > 0) {
                            scores = fbScores;
                            window._tournamentScores = fbScores;
                        }
                    } catch (err) {
                        console.log('[Mochi] Firebase score load error:', err);
                    }
                }
                if (scores.length === 0) {
                    list.innerHTML = '<div class="gl-no-scores">No scores yet — game in progress!</div>';
                } else {
                    list.innerHTML = scores.slice(0, 20).map((s, i) =>
                        `<div class="gl-score-row">
                            <span class="gl-rank">#${i + 1}</span>
                            <span class="gl-uname">${escapeHtml(s.name)}</span>
                            <span class="gl-score-val">${Number(s.score).toLocaleString()}</span>
                        </div>`
                    ).join('');
                }
                return;
            }

            try {
                const fetchCount = code ? 50 : 10;
                const allScores = await readClient.readContract({
                    address: CONTRACT,
                    functionName: 'get_top_scores',
                    args: [fetchCount]
                });
                if (!allScores || allScores.length === 0) {
                    // Show local best as fallback when chain has no scores
                    const localBest = window.walletAddr ? getLocalBest(window.walletAddr) : null;
                    if (localBest) {
                        list.innerHTML = '<div class="gl-score-row" style="border-color:rgba(180,79,255,0.4);"><span class="gl-rank">#1</span><span class="gl-uname">' + escapeHtml(localBest.name) + ' <span style="opacity:0.5;font-size:9px">(local)</span></span><span class="gl-score-val">' + Number(localBest.score).toLocaleString() + '</span></div><div class="gl-no-scores" style="padding:8px;">On-chain scores pending consensus</div>';
                    } else {
                        list.innerHTML = '<div class="gl-no-scores">No scores yet — be the first!</div>';
                    }
                    return;
                }
                let scores = allScores;
                if (code) {
                    const prefix = code + ':';
                    scores = allScores
                        .filter(s => String(s.name).startsWith(prefix))
                        .slice(0, 10)
                        .map(s => ({ ...s, name: String(s.name).slice(prefix.length) }));
                }
                if (scores.length === 0) {
                    list.innerHTML = '<div class="gl-no-scores">No scores for session ' + escapeHtml(code) + ' yet!</div>';
                    return;
                }
                list.innerHTML = scores.map((s, i) =>
                    `<div class="gl-score-row">
                        <span class="gl-rank">#${i + 1}</span>
                        <span class="gl-uname">${escapeHtml(s.name)}</span>
                        <span class="gl-score-val">${Number(s.score).toLocaleString()}</span>
                    </div>`
                ).join('');
            } catch (err) {
                list.innerHTML = `<div class="gl-no-scores">Could not load: ${escapeHtml((err.message || String(err)).substring(0, 80))}</div>`;
            }
        }

        // Called by game when game over
        window.mochiOnGameOver = (scoreVal) => {
            // Track guest best score
            if (window.guestName && !window.walletAddr) {
                if (!window._guestBest || scoreVal > window._guestBest) {
                    window._guestBest = scoreVal;
                }
            }
            // Tournament score: record locally AND sync to Firebase
            if (window.sessionCode) {
                const playerName = window._submittedName || window.guestName;
                if (playerName) {
                    // Local tracking
                    if (!window._tournamentScores) window._tournamentScores = [];
                    const existing = window._tournamentScores.findIndex(e => e.name === playerName);
                    if (existing === -1) {
                        window._tournamentScores.push({ name: playerName, score: scoreVal });
                    } else if (scoreVal > window._tournamentScores[existing].score) {
                        window._tournamentScores[existing].score = scoreVal;
                    }
                    window._tournamentScores.sort((a, b) => b.score - a.score);
                    // Sync to Firebase so other devices see this score
                    if (_useFirebase()) {
                        fbSubmitScore(window.sessionCode, playerName, scoreVal).then(() => {
                            // After writing, read all scores from Firebase to update local list
                            return fbLoadScores(window.sessionCode);
                        }).then(scores => {
                            if (scores && scores.length > 0) {
                                window._tournamentScores = scores;
                            }
                        }).catch(err => console.log('[Mochi] Firebase score sync error:', err));
                    }
                    // Mark player as done in the player panel
                    const p = (window._tournamentPlayers || []).find(x => x.name === playerName);
                    if (p) { p.status = 'done'; refreshPlayersPanel(); }
                }
            }

            const panel = document.getElementById('gl-panel');
            panel.dataset.score = String(scoreVal);
            const inputRow = document.getElementById('gl-input-row');
            const guestRow = document.getElementById('gl-guest-row');

            if (window.sessionCode && !window.walletAddr) {
                // Tournament guest mode: show score, no on-chain submit, view local leaderboard
                inputRow.style.display = 'none';
                guestRow.style.display = 'block';
                const playerName = window.guestName || 'Guest';
                guestRow.innerHTML = '<strong>' + escapeHtml(playerName) + '</strong> — ' + Number(scoreVal).toLocaleString() + ' pts';
            } else if (window.guestName && !window.walletAddr) {
                // Solo guest: show score, prompt to connect wallet
                inputRow.style.display = 'none';
                guestRow.style.display = 'block';
                guestRow.textContent = window.guestName + ' — ' + Number(scoreVal).toLocaleString() + ' pts  (connect wallet to save)';
            } else if (window.walletAddr && window._submittedName) {
                // Wallet connected + name registered: show score, track local best, optional submit
                inputRow.style.display = 'none';
                guestRow.style.display = 'block';
                const isNewBest = setLocalBest(window.walletAddr, window._submittedName, scoreVal);
                const bestData = getLocalBest(window.walletAddr);
                const bestVal = bestData ? bestData.score : scoreVal;
                guestRow.innerHTML = '<strong>' + escapeHtml(window._submittedName) + '</strong> — ' + Number(scoreVal).toLocaleString() + ' pts';
                // Show best score row
                const bestRow = document.getElementById('gl-best-row');
                bestRow.style.display = 'block';
                bestRow.innerHTML = (isNewBest ? '🏆 NEW HIGH SCORE! ' : 'BEST: ') + Number(bestVal).toLocaleString();
                bestRow.style.color = isNewBest ? '#f4c010' : '#b44fff';
                // Show submit button
                const submitBestBtn = document.getElementById('gl-submit-best-btn');
                submitBestBtn.style.display = 'block';
                submitBestBtn.disabled = false;
                submitBestBtn.textContent = '⬡ Submit Best (' + Number(bestVal).toLocaleString() + ') to Chain';
            } else {
                inputRow.style.display = 'flex';
                guestRow.style.display = 'none';
            }
            panel.style.display = 'flex';
            applySessionUI();

            // Show leaderboard button: in tournament only after timer expires, always in solo
            const boardBtn = document.getElementById('gl-board-btn');
            if (window.sessionCode) {
                boardBtn.style.display = window._tournamentRunDone ? '' : 'none';
            } else {
                boardBtn.style.display = '';
            }

            // Auto-open tournament leaderboard only when timer expires
            if (window.sessionCode && window._tournamentRunDone) {
                setTimeout(openLeaderboard, 1500);
            }
        };

        // Called by game on restart
        window.mochiOnRestart = () => {
            document.getElementById('gl-panel').style.display = 'none';
            document.getElementById('gl-leaderboard-overlay').style.display = 'none';
            document.getElementById('gl-submit-btn').disabled = false;
            document.getElementById('gl-submit-best-btn').style.display = 'none';
            document.getElementById('gl-best-row').style.display = 'none';
            setStatus('');
            // Mark this player as playing in the tournament panel
            if (window.sessionCode && window.guestName) {
                const p = (window._tournamentPlayers || []).find(x => x.name === window.guestName);
                if (p) { p.status = 'playing'; refreshPlayersPanel(); }
            }
        };

        // ─── Submit Best Score (on-demand, player chooses when) ──────
        document.getElementById('gl-submit-best-btn').addEventListener('click', async function () {
            const btn = this;
            const bestData = getLocalBest(window.walletAddr);
            if (!bestData) return;
            const rawName = bestData.name;
            const scoreVal = bestData.score;
            const code = window.sessionCode;
            const name = code ? code + ':' + rawName : rawName;
            const prov = window.activeProvider || window.ethereum;
            if (!prov || !window.walletAddr) return;

            btn.disabled = true;
            try {
                setStatus('Submitting best score…');
                await ensureOnGenLayerChain();

                const writeClient = createClient({
                    chain: testnetBradbury,
                    account: window.walletAddr,
                    provider: prov
                });

                setStatus('Approve in wallet…');
                const txHash = await writeClient.writeContract({
                    address: CONTRACT,
                    functionName: 'submit_score',
                    args: [name, scoreVal],
                    value: BigInt(0)
                });

                const explorerUrl = 'https://explorer-bradbury.genlayer.com/tx/' + txHash;
                setStatus('TX sent — waiting for consensus…');

                // Race: wait for receipt OR 60s timeout
                const receiptPromise = readClient.waitForTransactionReceipt({
                    hash: txHash,
                    status: 'ACCEPTED',
                    interval: 4000,
                    retries: 15
                });
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('timeout')), 60000)
                );

                try {
                    await Promise.race([receiptPromise, timeoutPromise]);
                    const s = document.getElementById('gl-status');
                    s.innerHTML = '✓ Score accepted! <a href="' + explorerUrl + '" target="_blank" rel="noopener" style="color:#00dcff;text-decoration:underline;font-size:11px;">View tx ↗</a>';
                    s.style.color = '#39ff8e';
                } catch (_) {
                    const s = document.getElementById('gl-status');
                    s.innerHTML = '⏳ Score submitted — consensus in progress. <a href="' + explorerUrl + '" target="_blank" rel="noopener" style="color:#00dcff;text-decoration:underline;font-size:11px;">View tx ↗</a>';
                    s.style.color = '#ffb347';
                }
                btn.textContent = '✓ Submitted';
            } catch (err) {
                const msg = (err.message || String(err));
                if (msg.toLowerCase().includes('rejected') || msg.toLowerCase().includes('denied')) {
                    setStatus('Transaction rejected by user', '#ff6b6b');
                } else {
                    setStatus('Error: ' + msg.substring(0, 120), '#ff6b6b');
                }
                btn.disabled = false;
            }
        });

        // ─── Submit Score via MetaMask ─────────────────────────────────
        document.getElementById('gl-submit-btn').addEventListener('click', async () => {
            const nameInput = document.getElementById('gl-name');
            const rawName = nameInput.value.trim();
            const scoreVal = parseInt(document.getElementById('gl-panel').dataset.score || '0');
            const btn = document.getElementById('gl-submit-btn');
            const code = window.sessionCode;
            const maxLen = code ? MAX_NAME_SESSION : MAX_NAME_GLOBAL;

            if (rawName.length < 1 || rawName.length > maxLen) {
                setStatus('Name must be 1–' + maxLen + ' characters', '#ff2d78');
                return;
            }
            const prov = window.activeProvider || window.ethereum;
            if (!prov) {
                setStatus('No wallet found — install MetaMask or another EVM wallet', '#ff2d78');
                return;
            }

            const name = code ? code + ':' + rawName : rawName;

            btn.disabled = true;
            try {
                let walletAddr = window.walletAddr;
                if (!walletAddr) {
                    setStatus('Connecting wallet…');
                    const accounts = await prov.request({ method: 'eth_requestAccounts' });
                    walletAddr = accounts[0];
                    window.walletAddr = walletAddr;
                    window.activeProvider = prov;
                } else {
                    setStatus('Submitting…');
                }

                // Check GEN balance — warn if zero so users know to visit faucet
                try {
                    const balHex = await prov.request({ method: 'eth_getBalance', params: [walletAddr, 'latest'] });
                    const bal = BigInt(balHex);
                    if (bal === 0n) {
                        const s = document.getElementById('gl-status');
                        s.innerHTML = '⚠ You need a tiny bit of GEN for gas. Get free testnet GEN at <a href="https://testnet-faucet.genlayer.foundation" target="_blank" rel="noopener" style="color:#00dcff;text-decoration:underline">testnet-faucet.genlayer.foundation</a> then retry.';
                        s.style.color = '#ffb347';
                        btn.disabled = false;
                        return;
                    }
                } catch (_) { /* balance check is best-effort */ }

                setStatus('Switching to GenLayer network…');
                await ensureOnGenLayerChain();

                const writeClient = createClient({
                    chain: testnetBradbury,
                    account: walletAddr,
                    provider: window.activeProvider || window.ethereum
                });

                setStatus('Submitting… AI validators are reviewing your username ✦ (approve in wallet)');
                let txHash;
                txHash = await writeClient.writeContract({
                    address: CONTRACT,
                    functionName: 'submit_score',
                    args: [name, scoreVal],
                    value: BigInt(0)
                });

                // Store submitted name for profile chip
                window._submittedName = rawName;
                updateHudProfile();

                setStatus('TX sent — waiting for validator consensus…');
                // Race: wait for receipt OR 60s timeout
                const receiptPromise = readClient.waitForTransactionReceipt({
                    hash: txHash,
                    status: 'ACCEPTED',
                    interval: 4000,
                    retries: 15
                });
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('timeout')), 60000)
                );

                let accepted = false;
                try {
                    await Promise.race([receiptPromise, timeoutPromise]);
                    accepted = true;
                } catch (_) { /* timeout */ }

                const explorerUrl = 'https://explorer-bradbury.genlayer.com/tx/' + txHash;
                const s = document.getElementById('gl-status');
                if (accepted) {
                    s.innerHTML = '✓ Score accepted! <a href="' + explorerUrl + '" target="_blank" rel="noopener" style="color:#00dcff;text-decoration:underline;font-size:11px;">View tx ↗</a>';
                    s.style.color = '#39ff8e';
                } else {
                    s.innerHTML = '⏳ Score submitted — consensus in progress. <a href="' + explorerUrl + '" target="_blank" rel="noopener" style="color:#00dcff;text-decoration:underline;font-size:11px;">View tx ↗</a>';
                    s.style.color = '#ffb347';
                }
                setTimeout(openLeaderboard, 3000);
            } catch (err) {
                const msg = (err.message || String(err));
                if (msg.toLowerCase().includes('rejected') || msg.toLowerCase().includes('denied')) {
                    setStatus('Transaction rejected by user', '#ff6b6b');
                } else if (msg.toLowerCase().includes('username rejected')) {
                    setStatus('Username flagged by AI moderation', '#ff2d78');
                } else {
                    setStatus('Error: ' + msg.substring(0, 120), '#ff6b6b');
                }
                btn.disabled = false;
            }
        });

        let _lbRefreshInterval = null;
        function openLeaderboard() {
            document.getElementById('gl-leaderboard-overlay').style.display = 'flex';
            loadTopScores();
            clearInterval(_lbRefreshInterval);
            _lbRefreshInterval = setInterval(loadTopScores, 15000);
        }
        function closeLeaderboard() {
            document.getElementById('gl-leaderboard-overlay').style.display = 'none';
            clearInterval(_lbRefreshInterval);
            _lbRefreshInterval = null;
        }

        document.getElementById('gl-board-btn').addEventListener('click', openLeaderboard);
        document.getElementById('gl-lb-close').addEventListener('click', closeLeaderboard);
    </script>
</body>

</html>
